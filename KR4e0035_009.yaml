body:
  text: 劉彥昺集卷九明劉炳撰楊維楨評雜文三才合德說堯舜受禪民之幸也聖人之大公中庸之道也經也湯武放伐民之幸也聖人之不幸時中之道也權也守經行權待時而動順天應人奉天時也故聖人與天地合德殷之三子說微子去之不亦知乎箕子為之奴不亦仁乎比干諫而死不亦勇乎三子者不同道其心一也一者何也曰仁也君子亦仁而已矣何必同聖人無私說武王訪於箕子箕子乃陳洪範九疇夫武玉革命之君也箕子亡國之臣也可謂不共戴天矣然則武王箕子之心何以哉曰武王之訪以道也箕子之陳亦以道也皆聖人之大公非一己之私也君子居易說君子之窮也耕莘釣渭若將終身焉其達也相湯武而行放伐焉窮亦是人也達亦是人也濳龍飛龍隨時隱見故君子藏器於身待時而動子思曰君子居易以俟命回也德說旭日之光先照髙山聖人之教先成上士故顔子得孔子為之依歸如時雨之化焉其次則成德達材答問私淑艾者益下而益逺各因其材而篤焉故孔子曰中人以上可以語上也上下相成說周武克商而夷齊采薇光武中興而子陵埀釣宋祖受禪而淵眀遁跡建隆踐祚而希夷髙卧彼四君者能成五子之節此五子者能成四君之義孟子曰故將大有為之君必有所不召之臣其斯之謂乎取人以身說漢之股肱秦時草野之人也唐之將相隋代棄捐之徒也元之輔弼金室遺逸之士也自古創業之君莫不取材於前代故人材應運而興易曰雲從龍風從虎聖人作而萬物覩誠哉是言也後代驅人材以資敵國至於國亡而不悟焉哀哉聖賢行道說或曰皋䕫稷契唐虞之賢佐也堯有天下四臣與舜比肩而事堯舜受堯禪四臣與禹比肩而事舜王者之佐莫賢于伊尹五就桀五就湯霸者之佐管夷吾百里奚其尤也管夷吾釋幽囚而相桓公桓公以霸孔子稱之百里奚去虞而虞亡入秦而秦霸孟子許之王者之師莫尊于孔子孟子孔子歷應諸侯之聘孟子游齊梁之國後代人臣重守節則彼皆非耶迂叟曰聖人以行道濟時為心然亦未嘗苟合也故出處去就惟義所在以守節而議之者豈足以知其心哉孔子曰君子之於天下也無適也無莫也義之與比是也智愚同德說人心如巨燭然之於有生之初聖愚所同也可以照華屋可以照茅屋無加也無損也然聖人之燭明竝乎日月常人之燭乍明而乍滅嗚呼世之人能不滅其燭者幾何人哉韓子曰欲知學之力賢愚同一初勉學銘維士也學而不勉何以立身勉而不篤莫由致用以藏以修毋怠毋躁恐筋力之就衰悼歲月之不早前而非者已往而莫追後而來者或庶幾乎其有造惟爾某為丈夫者果如此而生如此而老耶故銘兹座隅爾其勉諸永終是保告先聖文維大明洪武歲次甲子五月戊戌朔越五日壬寅後學某等敢昭告於先聖大成至聖文宣王之靈曰猗歟聖道師表萬代泰山黃河之流峙景星慶雲之昭麗嘉禾芝草之禎祥麟鳳龜龍之奇異仰之瞻之是則是式髙莫可企深莫可際嗟嗟子襟總角趨庭以訓以謨欽誦遺經早失所怙中罹甲兵駑鈍偷惰內省如焚驅馳歲故年往志存齒髮日悴窮廬悲呻幸守丘墓桑梓是鄰追憶舊習講學有賔涓兹令節㫖酒蘩蘋恭率諸生明薦載陳庶假靈威啓我後人洋洋在上䖍申告文關西義隱傳關西義隱者楊姓焕文字也其先代為太尉震之後由關西遷汴再遷江左復官于鄱故至今家焉公生而精偉讀書尚氣義至正壬辰四方蜂起兵蔓於鄱公倡義旅保閭閈民賴以安焉或勸其乘時樹功業則俯首不答洪武之初鄉里有劇寇馬某匿山谷剽劫為民害官捕之久不獲下令購重賞有能致者給之公因緝其蹤糾有膽勇者數輩往覘其巢冦覺鼓其黨舞㦸出拒公嬰其鋒三戰却之遂逐北冦蹶生縛之械送有司上功幕府以前賞給却而不受議奏爵其勞公辭謝曰特為民除其蠧耳豈希利祿耶竟拂衣而歸同郡劉某往拜之曰兹不共戴天之讐微公之計不能殄也獻白金為壽公笑曰官賞且不受寧受私謝乎為士者固當除殘去暴况在交游之讐不與同國乎飲酒三日而别時議多之㑹朝廷有㫖凡民年髙有德者入覲計議公在行中廷見條治安十餘事上之不報遂告病歸鄉先時嘗涉海適遼覘邊域形勝厄塞及得敵人虛實之情因慨然曰邊務多有可建者為丈夫者安能坐受敵人之詭僞乎將圖上方略或勸之曰計若遂恐公筋力非少壯之任矣幸審之乃撫膺嘆曰計誠晚矣景在桑榆矣遂絶口不復言每良辰暇日登髙指顧山川見長雲飛鳥之勢感劉豫州髀裏肉生之歎因以杖擊石長嘯而歌曰老驥伏櫪志在千里烈士暮年壯心不已此曹孟德之詩也耶乃與水北山人徐某究五緯河洛之書以耕釣自將終焉嗚呼士生於世蓋將有為公能不以富貴利達動其心能為人所難能亦其發於天性之至有足以啓人心厲衰俗者矣可使其義不著白於世耶故為著關西義隱傳俾來者將有徴焉烏石山人傳烏石山人劉姓子升字也世居鄱陽義城之東父字積仁樂隱不仕以詩禮自尚為故族也山人性冲默寡欲不妄言笑好讀書修已以為樂處宗族以義交朋友以信故人多愛之有司嘗以孝悌力田薦嬰疾不應或勸之仕答曰豈不聞四皓之歌乎與其富貴而詘人寧貧賤而肆志耳馬少游曰人生但取衣食才足乘下澤車鄉里稱善人斯可矣誠竊慕之宅邉有山山石皆黝色若漆可愛嘉木踈茂石磴平峭可登可坐暇日與知己者或攜酒宴逰擊石臨眺浩歌以寓懷東睇九華列屏空翠如飾可以招飛仙而凌八極也西望則彭蠡如練一碧萬頃滄波西流浩浩無際想夫樓櫓如林旌旗蔽空風雲霸氣於今安在哉但見夕陽西傾白鳥孤沒江山如昨風帆出入於烟波野樹之外弔古懷今寧不有感耶而為之歌曰維山之蒼蒼兮黝石齒齒登髙遐眺兮一碧無際宇宙恍惚兮滔滔逝波人生寓形兮百歲幾何一氣聚散兮隂陽之化倐忽委棄兮如閲傳舍仰視俯育兮惟善之修失身辱先兮不孝之尤先哲所懼兮薄氷是戒富貴利達兮何事求外先人舊廬兮以蔽風雨維桑與梓兮必恭敬止寒泉涓涓兮風木之悲蘋藻致潔兮願言永思全生全歸兮先聖之訓克保首領兮蓋棺事定夢幻泡影兮白駒之隙達人忘慮兮樂天俟命白雲可招兮凉風西來撫膺長嘯兮悠悠我懷歌已聞者曰此達士之詞也斯人也心際物表富貴其能羈乎山人性嗜山水之趣故自號烏石山人讚者曰余讀烏石山人傳觀其樂天自信夫軒冕豈能動其心哉抑列禦冦之儔歟洪武乙丑八月師古齊記神農后稷氏以耕稼教民為食今之人亦善耕稼無他師於古也公輸氏善宮室舟車今之人亦善宮室舟車無他師於古也白圭陶朱氏善居貨今之人亦善居貨無他師於古也農工商賈雜藝皆能師於古以成其名而况於士君子者乎周公孔子顔孟其道則仁義孝弟忠信其藝則禮樂射御書數信之於古傳之於今皆士君子之所當師鄱陽章方太氏以壯年明敏之姿好學不倦以師古扁其齊而屬記焉豫聞而嘉之或曰生乎今之時而欲師於古何也豫曰不然古即今今即古也今人視前人為古後人視今人又為古矣曲禮曰人其父生師教之孔子曰三人行必有我師焉故孔子嘗師老聃孟子師孔子之孫子思揚子曰務學不如務求師孟子曰夫道若大路然豈難知哉人病不求耳子歸而求之有餘師是則聖賢皆師於古而况於今人乎夫天之所以與人者豈有古今之異哉惟人學與不學耳其他若異端虛無權謀醫巫卜筮相命皆百工之一技耳又不若農工商賈有禆於時也烏足以當師古哉今方太果能修其身以周公孔子顔孟之學為業他日致諸事業立身行道埀範後代豈小補哉豈非師於古而用於今乎若循其名而失其實非豫之望也方太其勉之古趣軒記鄱城之東湖澄數頃烟波釣艇往來搖宕有沙鳥芰荷之景而芝山直其北嵐光雲影幽林空翆有杖藜攜酒之勝蓋因山川清趣之氣所鍾往往有俊秀之士出乎其間焉胡伯清氏以茂年好學豫嘗過其古趣軒左圖右史商彝漢刻古今人名畫雜陳几席客至則焚香鼓琴詠詩煮茗終日不厭或曰古趣可嘉矣未見古人焉伯清矍然曰孰為古人猶可見耶吁堯舜禹湯文武周公孔子顔孟其古人也其人逺矣其書存焉在書則典謨政事之治有疏通知逺之教焉在詩則雅頌情性之正有溫柔敦厚之教焉在易則爻象隂陽之變有潔净精微之教焉在春秋則治亂賞罰之義有屬辭比事之教焉在禮記則禮樂人倫之本有扶導防範之教焉讀其書行其道猶見古人也孔子曰好學近乎智力行近乎仁知恥近乎勇知斯三者則知所以修身矣博學之審問之慎思之明辨之篤行之可不學乎今伯清有讀書之姿有讀書之時有讀書之地誠能自勗則他日措諸事業濟世澤民著功勳以顯親埀後其可量耶豈止於山川登覽勝槩而已哉故為記於軒之壁以驗他日之所至焉懶雲莊記鄱無無居士扁其莊曰懶雲客有過而問曰居士以五尺之軀強艾之年孤鶴其清長松其秀出論如傾湖處劇若轉丸政當孜孜惴惴分陰是惜運甓而居考德問道以待明時之需子嘗直黃扉簪螭頭之筆應列宿宰百里之政未足為盛德事也昔申公乘蒲輪之召呂望膺後車之載以居士之年猶為未也噫嘻客非知我者夫懶也者怠惰金石慵癖膠漆棲遲偃仰縱逸自便或曲肱枕琴或箕踞泉石跣足乎林下坦腹乎北窗以傲以游匪癡匪戇不檢不飾弗矜弗誇處已失恭接物少莊狼藉圖史闒茸冠履淋漓筆硯顛倒裳衣起居無時外形骸而放浪者爾夫雲也者非烟非霧非霞非靄隂陽之聚山川之氣絪緼上礴五色為慶三色為矞祥光為景瑞彩為卿起石出岫抱日浮天儀如鳳鸞如芝如蓋乘風從龍作為霖雨澤大地而利蒼生者也豫兹投老丘壑病目無所為自念少失所怙無學問功業以少見於世出不能挾太阿之精飲河洛之馬擁盾寒旗鼓行萬里清邉鋒掃妖彗以匡社稷康濟生民居不能溯洙泗之源緝鄒魯之緒讀六經百子之書立言埀訓於後代顧乃如此而生如此而老耶歲月邁矣髮種種矣文采無所發越矣時時抱膝長歌短吟聊以抒胸中之磊落耳客乃瞿然而起曰懶雲懶雲侶孤鶴而棲長松乎霖九土而利萬物乎變化有象卷舒隨時有其體必有其用矣居士合掌面壁趺坐笑而不答弔余忠愍公祭文維大明洪武歲次已未正月八日大都督掌記文林郎鄱陽劉某恭承公務道經潯陽弭莭舒浦結珮灊嶠敬弔故元夏國忠愍余公之墓夫過汾陽而仰令公駐大梁而懷夷門義之所著心之所感也雖音容泯絶而英聲令德昭若日月仰瞻墓道苟慕義彊仁者孰不興起特以瓣香絮酒致祭于先生焉嗚呼辭曰疾風草徑版蕩臣忠繄元之季橫流四衝秦失其鹿素靈夜哭大厦之傾支匪一木維公鷹揚拯其頽綱義同田橫忠軼睢陽闔室捐軀與城俱亡大星墮地萇𢎞之碧昭若雲漢烈于金石古舒之濵斷碑嶙峋隧草黯翠夜臺壘雲仰兹令德載瞻載式攬悲蘭皋屑淚松砌嗚呼哀哉附故府君劉公墓志銘翰林待制李燦撰公姓劉諱明字衮明居鄱陽義城之東家世簪纓為望族公生而挺茂好讀書以恭讓溫和處已與人交際喜色溢於顔面人無不敬從之元季壬辰海㝢塵沸蘄兵枝延於鄱燒香以為信禮佛以結社絳幘赭辨民欲趨之公曰此特緑林之徒耳烏合剽掠宜謹避之遂激鄉閭以義勇保境人獲康靖焉官軍東來公為嚮導克復郡邑總兵官薩木丹巴勒平章屢以銀碗宫段賞賜有差運糧間道轉戰鄰邑志在澄亂以匡濟于時焉流遇戎馬親犯矢石録功授浮梁州判官從征信陽俄以疾癘及病篤戒諸子曰先人敝廬足以避風雨郭外之田足以具飦粥讀書為善清白傳家足以立身無辱於不義也所恨者殘虜未滅不能盡忠於國耳竟以病終時論惜其志焉公以甲辰年正月生於至正甲午三月殁祖字季父得新娶陳氏子字積人女顔貞媳朱氏孫子升必昭桂華葬於里之烏石山亥山已向實至正甲午冬十月也為之銘曰天狼晝茫義旌奮張釁鼓椎牛楫擊膽嘗視虜如仇孤忠未償胡罹于灾天道匪常義城之東梧楸蒼蒼馬鬛泫露魄湮聲揚氣為虹霓上延奎光過者仰止瞻兹銘章劉府君墓碣夏谷忠愍公余闕撰元至元戊寅八月十六日鄱陽劉君殁既葬而天下兵亂不克立碣墓左今海宇晏夷冢子昺始刻銘以昭厥志君諱斗鳳字友梧母李夢鳳翥北斗間而生故名君踈髯偉度倜儻負竒氣嘗攻舉子業屢試不利監郡馬公某舉茂材部使者王公都中賢之復交薦授集慶句容校官既而慨然曰大丈夫坐廟堂佐天子出號令以保艾庶民不然仗節出萬里外氣懾夷狄耳奈何栖栖服章逢鄉井耶遂絶江渡淮遡河濟過齊魯之郊遨逰燕趙間周回秦漢故都南還吳楚登髙酌酒弔古豪傑遺跡發為歌詩皆磊落魁奇當時虞文靖公集揭文安公奚斯禮部郎中吳公師道咸交君愛其才雄贍爭言於中書擢應奉翰林文字未上而卒年三十二以卒之年十月五日葬鄱陽義城東潘超之原遺詩若干卷燬於兵父諱環岫字傑夫兩浙鹽運提舉大父安朝宋國子生君家世簪纓光奕史牒宋贈檢校太尉中書令左僕射封潁川王浩八世祖也君克繼詩書有志弗獲顯庸惜哉配朱氏生昺昱燮三男子昱燮亦夭昺復業儒文聲動搢紳間銘曰猗鳳鳥昧靈兆夀曷少氣則浩跖而老顔而夭匪天道兮鄱陽劉節婦朱氏墓碣銘翰林學士榮祿大夫宋濓撰鄱陽堯山有節婦曰朱夫人諱則中性穎茂知留意詩書年十五歸同里句容儒學教諭劉君斗鳳字友梧歸十八年生三子昺煜燮及一女旭貞而劉君亡夫人之年甫三十二又二十四年乃終得夀五十六夫人自劉君殁悉屏脂澤弗御曰我未亡人也焉用爾為事姑李氏甚至僕人媵女凡數百指夫人晨起坐堂上命之曰爾為某事汝為其事晚各㑹其成無敢爽期者至於中饋紉縫之職夫人日相親雖勞不辭閭井有來謁者必飲食之若賢士大夫則留浹旬弗之厭行必又有所贐窶人或有斗升之糴司廩者慵於啓鑰難之夫人罵曰彼方懸腹待炊爾可若是怠耶遇歲歉及大雨雪必散粟賑其乏雖蔬材之細亦多寡分給於衆族姻之間有搆讒言而弗靖者夫人每具食調解乃已尤切於訓子嘗語之曰汝父積書數千卷而不效他人置美田宅者欲爾等知學也爾等不學我將焚其書故內外親若尊者同列者卑幼者皆賢夫人之行無異言歲壬辰夫人家燬於兵昺提義旅隨大將上饒燮已死于癘童御散盡旭貞亦適浮梁張子鳴氏未幾又為仇家所害夫人間關出萬死獨抱昺子玉珊往依張使玉珊衣垢敝服雜蕘兒牧豎中卒有急令竄山澤夫人以身先之每撫其頂泣曰我一家兵禍極矣汝父存亡未可知劉氏一宗若髮懸不墜者賴汝在耳奈何虎豹又窺伺未已耶鬼神若有知得持汝以見汝父我含笑入地矣言訖衣袂盡濕後八年昺從間道歸見夫人相與抱持哭絶而復蘇夫人指玉珊曰吾所以不死者有此故爾見者皆灑涕昺因迎養新安復遷之浮梁竟以疾卒張舍實某年某月四日也葬於發京鄉之史源昺以文學政事嚮用於時豫辱與之交自狀夫人羣行持以詣豫拜且泣曰吾母以節自持皎如出日不幸遭離亂以死死又無以暴白於後世不孝莫大焉儻先生憐而俾之銘庶幾可不朽者豫不敢辭銘曰夫人之節石堅玉貞何不享有諸福而憂患是嬰彼宰物者孰尸其平然而德厚流光如筮斯徴短雖一日長或千齡則夫人之不死者愈逺而愈名史源之山封若斧形評騭馴行太史勒銘後數百載尚知為鄱陽節婦之塋故處士鄱陽劉公墓志銘奉議大夫延平路總管兼管內勸農防禦使安成周洪撰公諱由孫字傑夫號環岫姓劉氏家鄱陽之義城八世祖某唐兵部尚書為時名卿葬弋陽之旗鼓山里人祠於社其子孫蕃衍居上饒之葛原鄱之清塘樂平之劉坊屢有聞人而義城為特盛大父諱朝英宋國子上舍父諱瑞甫有隱德公生而魁岸長好倜儻之畫以宋季不仕元氏既下江南郡縣更代徭役特煩里豪黠囚並緣吞蝕閭左弗支往往蕩析公慨然曰吾獨不能安輯吾里中耶乃往謁令請自受事事無巨細必核其底即便於公私亟趨以赴有不可者懇懇以白上下利之而視公為舉措事以易集費乃大减權橫不得舞其詐而罷人滋息矣乃共推公為巨人長者而愛之若父母縣有疑獄亦資公為直由是諍訟有不之縣庭而析於公之一言俗以丕變素多良疇儲穀數萬斛凶歲則减價出穀而貸貧者食或不能庚因貰之弗較凡溪壑之病涉者悉為橋道以濟人尤便之平居以抑奸輔媺撫良善為心未及施於政而沒有識悼焉公生某年某月某日卒某年某月某日葬於里之張家山孺人李氏有懿行姑程氏年踰九十事之極敬愛而睦於姻族數具楮衾草履及棺槥以給貧乏人謂公之教蓋刑於家矣子三人長友竹能鼓琴好書而善青鳥之術次友梅集圖史喜賔客而樂花竹之玩次友梧從鄉先生月灣吳公學舉子業部使者王都中薦為德興縣教諭未幾翰林虞文靖公揭文安公引為應奉未行而殁有詩一集孫男十一人營爆光燦燧炯炳輝煜勳燮炳字彥昺友梧之子亦以能詩遊搢紳間距其大父之殁餘三十年而復求豫銘是將大其家者也乃悉著之系以銘曰源之濬其流長繄昔鼻祖盛有唐身教從孰強禦流亡四集居者訏我庾盈孰阻艱賈商以通羸者餐德之形庇於邇宜熾厥後復其始維乃孫襲詩禮請銘幽墟列兹誄澤存堂記同郡許瑤撰覩羮牆而見堯觀河洛而思禹蓋聖德元功著於宇宙澤在人心久而不泯歷千萬歲猶一日也况生之膝下覆育之恩如天罔極劬勞之念敢一日而忘哉故禮記之言曰父殁而不能讀父之書手澤存焉耳母殁而杯棬不能飲焉口澤之氣存焉耳鄱陽義城劉氏為郡著姓元至正之季彥昺劉君以義旅從軍於浙見時政日乖其志莫遂逮龍飛江左以獻書言事受知於上擢官清要輔政藩閫出宰百里兩考而歸以病告老林下構堂故址取禮記之意而扁以澤存著思親也嗚呼兵革以來故家文獻牙籖錦帙皆為灰燼而劉氏能存之君復能守之顧諟在前必恭敬止豈特春雨霜露而興怵惕悽愴之思其氣發揚於上而動昭明莙蒿之慮終身之慕寧或少替其與羮牆之見河洛之思同符合轍豈不可尚也耶孟子曰君子之澤五世而斬豈其然乎故祭義曰致愛則存致慤則著人子之思其親也思其居處思其笑語思其志意思其所樂思其所嗜况以其手澤之存者乎宜乎其不忍忘也詩曰永言孝思孝思維則劉氏賢豫孫登斯堂者必有所觀感而興起於無窮也故為記於堂之左方焉春雨軒記春雨軒鄱陽劉君彥昺之所作也春雨之濡人之所均被也而劉君獨取以名其軒何哉維君之母夫人朱當盛年喪其所天能保其家業以不廢其教諸子使之有成貞節之著凜如氷霜夫何十年之間喪亂薦罹而備歷乎艱險然迄能令其遺孫以紹其先業劉氏之不墜繄夫人之力是賴而今不幸不可作矣君方以文章嚮用於時宦游金陵去鄉土日益逺以為生不及致鍾釡之養死又不能效昔人之廬墓思親之念蓋無時而或忘方春之始雨露既濡君子履之孰無怵惕之思思之不可見矣故即夫所履者以名其居然則身之所履者雖衆人所均被而心之所思者則固君之所獨知而人莫或知之者矣記曰致敬則存致慤則著敬慤者即其心之思而著存其猶身之所履乎雖然君之居於斯也食息夢寐如或見其親油然孝思曾不與時而變遷秋霜冬日無非足以致其思也豈特有感於春而然乎夫人之墓君既請銘於太史宋公以豫辱有斯文一日之雅復俾為文以記斯軒嗚呼仁人孝子之思其親推其親亦曷有紀極也哉烏陽王褘記劉彥昺集卷九

body:
  text: 劉彦昺集巻四明劉炳撰楊維楨評樂府見月行自憐少小不識月疑是明鏡飛上天但看三五二八夜彎彎缺缺仍復圓悲歡離合每對此風雨隂晴經幾年壯强已過今老大俯仰嬋娟不勝慨也曾對月客長安蹇驢破㡌西風殘砧聲蕭條夜向夕劍影錯落秋生寒也曾對月秦樓夜春寒珠箔梨花謝金釵扶醉曉催雞翆被留香暖餘麝也曾對月抱遺經燈火繩樞掩草亭虀甕結氷寒走蠧芸窓露下晚収螢也曾對月榆闗戍百戰沙場士爭死金瘡臥馬瘴烟青玉帳磐雕陣雲紫也曾對月泊瀟湘商賈凄涼野店荒菰米黑沉烏啄雪栁條翠减雁啼霜也曾對月東華道影轉金莖閶闔曉玉殿承恩出苑遲瓊林侍宴簪花早衰病歸來百不成烟蓑雨笠學躬耕壯士寂寞吴牛喘倦翼凋零野鵲驚每慚泛渚袁宏詠那復登樓庾亮情飛盖青園歌已逺乘舟赤壁夢何慿月色不殊人自改搗藥惟應兔長在搴衣弔古倍增悲長跪臨風獻清酹朱顔易去不復來一日一醉能幾迴昨日少年今日老且須置酒登高臺桂花吹香白露下莫惜爛醉黄金罍舊游豈無歌舞地銅駝白骨迷蒼苔前人已往今還昔今人寧無後人憶後人復遣後人哀月落銀河瀉空碧評曰曲折備盡鬼妾行閨中女兒白如雪縣官娶作專房妾黄金翠羽繡羅襦枕邊誓死心不渝豈意榮華草頭露好似青藤倚枯樹一朝樹倒藤無依埀埀哀哭牽腸肚依稀無復半年春新官到任遣媒人鴛鴦錦帳重還整鸞鳯金釵依舊新洞房更結叮嚀語却說新情多勝故自分飛花逐水流為憐嬌蝶無鶯妬傷心認着主衣裳窓前臨鏡照新粧青銅欲待銷磨盡幾度春風幾斷腸評曰有喻而作雙桐生空井井上雙梧桐秋風易搖落緑葉墮鳴璫清隂捲重幄紋甃生旅葵銀甁響空索䟽枝覆烏臺交柯臨鳯閣美人矜容儀照影傷今昨鉛華逐波逝歡賞隨年薄行客攀轆轤哀聲隔簾箔紫騮馬寄朱士正紫騮馬雕鞍鞲來汗如赭恨郎騎馬過章臺醉月眠花㝷不來郎若歸時将馬賣無馬㝷春郎莫恠金銅仙人辭漢歌周伯寜同賦漢家黄金如土積鑄作仙人一千尺緱氏山頭曉日紅太一祠前露華碧璚漿凝彩剪雲凘玉屑無痕浸寒液安期日日候神仙王母朝朝見鳬舄千門萬户建明光上苑南山繞栢梁春滿甘泉千樹綠波涵太液百花香白麟朱雁呈祥瑞寳鼎芝房薦樂章詔遣衛青将驃騎使通司馬拜中郎待邊親駐狼居外出塞兵蔵馬邑旁龍馬錦韀來上谷蒲萄銀甕出西凉李陵臺畔西風冷蘇武坡前落日荒暮年始下輪臺詔思子宮前雙淚繞壯志凄凉天下悲巡幸東從海上迴封祠無成還碣石長生不復望蓬萊鼎湖龍去秋蕭瑟金鳬銀雁燈如漆空遺弓箭慘無神青龍使者宮車出萬牛如山千里來老涙裂眥銅仙摧前車未改後車轍昔人不盡今人哀傷心秋草茂陵苑又見東風銅雀臺評曰深戒窮兵之咎蘇小小歌同端孝思賦棠梨花開春日遲綠窓銀屏鸚鵡啼玉驄慣識㝷芳路手綰同心約郎去上之回上之回紫闕拂曙紅雲開蛟龍懸旌䴡曉日駱駝駕鼓鳴春雷前勾陳後𤣥武鳯凰來儀百獸舞左黄鉞右白旄萬國稽首諸侯朝玉帛如山不可計天子之夀四萬八千歲行路難奉君五綵鳯凰之綺幄七寳鴛鴦之錦牀博山氤氲之水屑金盤沆瀣之瓊漿春風無情不相待朱顔綠鬂年年改姑蘇䑓上鼔如雷四時歌舞百花開當年意氣今安在鬼火如燈秋似海董嬌嬈為周郁賦妾家住邯鄲少小矜容顔七歲畫娥眉十歲埀髻鬟十三刺繡人前坐十五秦箏架上彈紅粉樓高臨大路自恃芳華立門户鸚鵡春眠芍藥闌驕騘晚繫垂楊樹梅點香奩玉作鈿蓮移羅韈金為步朝歌暮飲綺羅樷東園桃李鬬春風黛疑栁淺勻朝翠朱訝櫻濃洗曉紅燭圍錦帳宵常曙香藹雕籠夕未空秋月春花等閒度誰憐窈窕迎新故夜夜虚迷洛浦雲朝朝枉結陽臺雨帶綰同心只自憐枕期連理翻成誤眼前相愛豈相知彈指風光節物移只道青春鎮長好那知白髪易如絲容顔銷歇鶯花冷歌舞凄凉鞍馬稀昨日樽前雙淚落誰似周郎情不薄得配鴛鴦死亦判願諧魚水生相託青鳥緘封書莫遲秦樓膓㫁夜烏啼君卿豈羨東牆約梁氏應同舉案齊評曰綺麗綺麗迎春曲燕梁綵飄金鳯喧翠襟小兒雙髻懸珊瑚鞭拆金鎖掣九地神牛飛上天東郊轆轤鳴紫犢綠蕪一片玻璃縠栁眉桃臉紅菲菲東園蝴蝶西園飛虞美人詞萬人劍氣真羆虎寳玦鴻門悲亞父隂陵失道豈天亡志輕仁義為降虜凄凉垓下楚歌哀玉碎花飛報危主至今荒塚說虞姬一去繁華名不死君不見玉環香㫁九泉扃萬古滄波流不清劉彦昺集巻四

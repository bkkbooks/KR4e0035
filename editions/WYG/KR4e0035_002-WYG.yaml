body:
  text: 劉彦昺集巻二明劉炳撰楊維楨評五言古詩擬古今人多結勢古人多結心結勢可趨利結心能斷金金堅義亦固利厚害彌深往者不咎昔來者當鑒今得漢彝簡周伯寜索香灰古彝多欵識蟠螭漢篆存黄金銷土色翆羽蝕雷文綺席流寒月銀屏度綵雲蘭灰能裹寄長唫晝夜分春夕直左掖懷周侍郎晚雨池上晴逶迤淡将夕金莖華月生綺樹流雲濕窓虚漏聲永幔捲爐烟襲憶我同袍人何由共瑤席簡孔博士宿雨曉還歇開窓銷鬰沈烟光藹芳樹池上鳴幽禽逶迤瞻郡齋窈窕期盍􅆪孤懷屢百積羣疑思一箴何時聨夜榻春漏委波聲評曰倣韋也左掖門朝退呈呉待制諸公謬忝金閨籍聨班趨晚朝逶迤西上門窈窕長安橋殘雪帶逺樹夕陽在山腰不有同袍者疇能慰寂寥張禮部卧疾殘雪晚還霽窓虛斜日迴故人久卧疾空堦生綠苔兒童諳藥裹吏牘委塵埃浮榮每為幻長嘯望層臺别京邑之東阿前年别鄉閭今年出京邑悠悠去江漢杳杳事行役所懼心志違况此風波急烏啼楓樹烟雁下蘆洲夕回首望長安蒼茫寸心失憶園廬種園在東臬草荒𤓰蔓長日落秋樹凉搴衣獨還往時逢野老憩自足田園賞沿溪暝還歸古寺烟鐘響示宜學績學甲戌三月題阿爺五十四憐汝纔始生恩育夙夜謹眉目秋水清行如生鹿跳語若流鶯鳴常時恣嬌頑計日期長成爾祖豪傑姿聲聞州郡欽一顧等成敗片言能重輕田園亘阡陌兵火成榛荆千頃遺寸波百田纔一塍官租因訟致薄業寧躬耕不辭生理苦所懼徭役并嗟予早失怙慈親訓遺經遭時風塵黑扶日雲霄青􅆪筆侍禁闥通籍居承明衰年遂冉冉薄宦徒營營辭官歸故園葺屋依先塋㸔花眼如霧種竹髪已星貧無金在嚢家有書滿籯念汝未强壯立身恐伶仃痛逼骨肉懷感慈肝膽驚男兒在忠孝業學崇勲名題詩冀汝識慰我桑榆情賦清華堂詩皇威戒安逸翰苑㳺神機天球列東序玉藻羅北扉蜒蜿紫氣潤璀璨虹光輝奎彩動黄閣文光照彤墀鼓枻洙泗源遵舟伊洛湄梁追昭明轍漢軼東平輗瀛洲浮暖吹銀潢演春漪芝蟠五色葉桃發萬年枝墨沼鵝羣浴書林燕子飛花隂移鶴仗竹色來鳯儀共沐恩波潤咸蒙聖澤滋河清仰文化同軌固磐基聽雨堂為安成周氏賦中年迫宦遊邈若胡與越悠悠烟樹遙杳杳闗河絶况兹風雨夕坐惜鴻雁隔篪塤寧共理孤燈耿還滅懐寳重經濟括嚢貴明哲何時對牀眠􅇺此膓内熱敬軒詩為王達善賦深巷何窈窕端居掩柴荆素心每無欲寡樸輕浮榮慮靜默自守神清淡忘形危坐白日晚踈林微雨晴開窓幽鳥啼滿階芳草青焚香奏絲桐愛此銷塵嬰孤雲野鶴唳絶壑流泉鳴髙懷曠而婉雅音誰復聽古人良已久寸心千古情郡齋讌集詩呈徐用中廣文諸先生郡齋文墨暇履端集朋曺春意藹萱草臘痕封栁條牕暄書蠧散簾深爐麝飄嘉園剪新韭芳壺湛清醪青甘浮橄欖紫馥吹蒲萄舒此羇旅况豈夸樽俎豪禮簡貴情厚心親自神交所念萍水逢回首江漢遙何殊瀛洲步未譲淮南招俯仰慰夙慕綢繆幸今朝題詩謝永好蕪詞慚草茅聞魯志敏訃音故國猶傳箭中原未觧戎遙聞故人死雙淚落秋風五言律詩題呂花園草堂朱雀橋何處銷殘暑城南茅屋幽晚烟將野色春樹帶江流愛竹從兒種躭杯與婦謀生涯成老圃不是故時侯郊居雜興柬陳遂良桃李漫成蹊茅堂習隠棲泉聲溪碓急山色野牆低相頷原非燕圍腰底用犀不嫌生理拙抱甕灌吾畦風雨行人少柴門午上扃土花沿砌碧山果墜枝青病眼躭書癖衰顔托酒星經邦方上武寂寞抱遺經題朱澗槃巻遙峯連碧磵茅屋俯青林徑晚花粘屐松寒雨潤琴酒甘和菊醸詩苦帶茶吟却憶文園老歸來雪滿簮寄子昇必昭昆季烏石山頭路秋風已送凉野橋苔浸碧雲碓稻舂黄扇影搖衣桁書聲出草堂惠連無俗事埀釣濯滄浪夜直呈翰林諸友中使傳金鑰嚴兵戒紫扉月高旗影直風急漏聲微鵲倦驚龍燭螢閒綴鳯幃不眠瞻北斗拜舞敢遲違六言詩歸舟懷善鄯廣海未回梅子黄垂雨霽橊花紅簇風輕天際歸舟何處日暮柴門自扃歌憶杯痕螘綠鬢憐鏡影鸞青心折少年塵夢絳嚢夜照流螢秋夜對月寄汪宗彝宮樹凉生絳闕玉階影轉銀河曾侍梨園供奉夢魂猶記笙歌抗節誓清瀚海請纓願繫樓蘭塵澀腰間白羽猶思射虎南山辯舌曾歸白璧酬恩盡散黄金范叔綈袍誰念悲歌自爨瑤琴薄技寧為雞口雄心每倚魚腸弊矣布袍雙袖御爐猶帶天香拜墓發京柬張子鳴表弟蓼莪之詩可讀風木之感無邉天涯不堪為客墓傍猶未有田思親不堪泣涕匡時未有勲名㫁機之訓猶在牽裾之恨㡬成劉彦昺集巻二

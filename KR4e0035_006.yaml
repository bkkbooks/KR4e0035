body:
  text: 劉彥昺集卷六明劉炳撰楊維楨評七言律詩七夕宿天堂寺西風吹夢宿僧堂誰遣黃金布地裝萬葉寶燈秋弄影九重珠塔夜浮光天連象闕星辰濕雲護龍宫雨露涼門外三車何必問大千身色兩俱忘逰丹青閣橋南楊栁亂成行出郭尋僧到上方城拱煙霞開錦繡山圍松竹奏笙簧半簾晚翠環溪閣一枕秋雲護石牀安得逺公同淨業白蓮池上挹天香寄武夷隱者金復嬰習隱名山四十年羊裘鶴􅌁鹿皮冠雲中杵臼聞雞犬月下笙簫引鳳鸞霞氣濕衣晨採藥虹光穿樹夜燒丹姓名漸覺無人識種得胡麻秖自餐丁卯立春簡蔡宗文昆季玉琯吹葭已應灰字題春帖手斜裁震司木德三陽泰律協條風一氣回鸞輅憶陪趨御苑燕叉曾賜出宫醅文園多病歸田早鬢影東風看野梅青樓曲劉子雍胡伯清程伯羽同賦畫闌落盡絳桃花依舊尋芳小徑斜鬢黛壓叉金有暈臂酥凝釧玉無瑕三千弱水波清淺十二巫雲樹碧遮郎馬不來春已暮淚痕香斷濕琵琶繡剩鴛鴦午睡長體嬌無力浴蘭湯生憎寶鏡鸞成匹死恨銀筝雁作行舞罷柘枝低拜月歌殘桃葉懶添香愁來自學秦宫女簾底吹笙引鳳凰楚腰纎細引纒頭秋怯珠簾半捲鈎雲戀陽臺雙作夢月生湘浦獨成愁鸞梭折齒花粘髓螺粉添眉栁帶羞雁過碧天書帛斷誤教人倚小紅樓寒鎖粧臺粉怯勻步金蓮小不生塵徑迷花雨鶯鶯月枕壓梨雲燕燕春衾剩半牀間翡翠叉分一股劈麒麟玉梅好似郎顔色只見東風不見人簡戴彥碩故人結得草堂低老圃連城近市西碧注硯池荷葉露紅沾屐齒杏花泥書懸牛角朝耕地飯飼魚苗晚灌畦只恐長安雲路近馬蹄催夢聽朝雞寄徐指揮報國功成鬢欲蒼承恩分節下南荒劍磨鯨海遺腥血馬渡龍沙帶戰瘡頒宴曉沾仙掌露賜衣春帶御爐香信陵門下今誰在萬里雲霄一羽翔呈西平侯沐都督西征西域慿陵久不賓詔書五道出將軍龍光燭劍銷邊祲虎氣揚旌壓陳雲周廟昔聞方叔頌漢廷今見二師勳春風三月鶯花禁歸騎笙歌奏凱聞和都督馮公韻鳳城宮闕倚蒼山虎衛旌旗拂畫闌輦路霜清梅破臘御溝波暖栁欺寒青雲每愧班超筆華髮應慚貢禹冠未信壯懷渾寂寞錦衣鞍馬出長安旅中除夕簡劉子憲助教張左司麝煤凝鴨鎖窗虛虎衛嚴城禁漏疏鄉夢牽情千里逺客愁隨臘一年除酒痕釀暖春連甕梅粉吹香晚近厨自寫桃符燒短燭壯懷那厭食無魚元日早朝呈翰林諸公禁城曉箭漏猶頻仙掌微茫曙色分虎衛鳴鞭瞻紫極鸞輿迎駕擁紅雲宮簾日轉旌旗合天仗風飄劍佩聞班次螭頭簮筆近緋袍因惹御爐熏早春呈吳待制上林春早陌塵香紫禁觚稜射日光新緑御河搖栁黛小紅宫樹試桃粧山連曉氣蟠龍虎臺枕東風憶鳯凰心折故園幽興獨尋僧看竹過鄰牆春寒寄魏居敬上苑春寒花信遲東風不放鎮帷犀栁塘沙冷回鴛夢草閣梁深落燕泥苔蝕井楣蝸觸角篝連香灺麝凝臍典衣剩欲銷塵鬢暖日城南信杖藜寄許永明公冕昆季得夫先生少年曾共請長纓雲壓旄頭劍氣腥諸葛有心扶漢室包胥無淚哭秦廷九鼇夜徙龍沙黑八駿秋迷鳥道青一别關河俱白首斷腸煙樹滿長汀寄賈文彬巡檢故人為别動經春野渡維舟送夕曛銀燭照窗秋聽雨角弓懸壁晚看雲山城旗影中流見草閣書聲隔岸聞江漢茫茫多舊識猶能俎豆説將軍文樓早朝柬程邦民諸公紫禁觚稜曙色微五更三點聽朝雞門開鳳闕鳴鞭肅駕備鸞輿簇仗齊玉座衮衣銀燭爛金罌湯餌翠簾低小臣簪筆還朝晚路繞芙蓉小苑西與子升弟觀捕魚栁條風脆已梳黃潮落溪毛石露梁帆腳壓霜寒殺網柁牙移月夜鳴榔載車有獵曾占渭鼓枻無歌豈濯湘義得錦鱗長尺半鄰翁新酒正吹香呈西平侯沐公股肱竭力定皇都開國功成與衆殊玉帶朱纓持虎節翠支金鉞護龍車秦關柱石風雲會漢室山河日月扶慚愧腐儒無補報得從門下曳長裾簡陳彥友陳伯諧陳伯純陳遂良飛舄長弓紫氣髙驅馳王事寸心勞烏桓月黑迷犀甲雁塞雲黃接虎韜禁漏尚聞金瑣闥御香猶惹錦羅袍劉郎老矣歸來晚花落山中舊種桃寄徐彥亨有懷操公琬先生故家文藻獨遺芳喬木隂陰覆短牆草壓山營迷虎旅樓遺宸翰祕龍章藝翻蠧影書帷靜竹映鵝羣墨沼香訪戴真成風致在夢懷風雨舊連牀天馬秋髙壓楚墟碧溪晴樹晚縈紆書聲連屋聞絃誦山色當窗列畫圖治縣已聞蝗避去解官曾有犢留無百年耆舊多零落白髮相看愧故吾悼亡呈敬義叔寂寞凝塵落暗簾綺􅐼秋鎖月纎纎紅銷蓮粉雙遺襪緑委菱香半掩奩絃斷鸞箏膠擬續針間鳳繡吐還粘最憐稚子黃昏候拜罷靈前短燭添慶張子明新居華屋新成曙色開蒼煙喬木帶縈回朱闌暖護宜男草綵服香浮阿母杯梅瓣粉飄催臘轉栁條青裊送春來羡君盡得溪山勝不愛雲臺愛酒臺賦牡丹柬劉子雍昆季并呈黃景昻程伯羽魏紫姚黃壓畫闌名園三月雨初乾舞回金屋迎飛燕宴罷瑤臺侍綵鸞錦里獨憐池館在清樽能共子孫看行雲易逐東風散莫惜狂歌爛漫歡徐叔度黃子初王仲愚同宿徐彥輔齋次韻草堂不厭客過臨清暑銷塵帶石林溪靜白鷗晴泛影樹幽黃鳥晚留音綺窗分榻簾隂轉銀燭移樽漏滴深向秀不堪鄰笛感墓亭秋思易傷心寄表弟朱永容永實昆弟渭陽河畔畫樓西紅粉闌干栁樹齊窗底折花騎竹馬街頭籠草鬭山雞銀屏褥隱鴛鴦並綺户香凝翡翠棲回首繁華成舊夢對牀今雨不堪題拜文公朱紫陽祠堂呈江惟中朱士正蘇明逺奎壁埀光間氣鍾儀刑一代屬成功泗沂道重尊天下濓洛源分出建中僻壤魚蟲沾化墨中原麟鳳仰遺風滄洲寂寞斯文弊泪灑秋煙野殿空過蕪城懷古寄程伯羽劉子雍胡伯清珠簾十里瓊花月惟見荒城背夕曛潮落𨝍溝迷廢壘樹連瓜步帶殘雲雄文猶記陳琳檄故苑空遺煬帝墳書劍昔曾趨幕府白頭應愧鮑參軍淮安懷古淮陰城北水連空漢將真成一夢中古廟卧苔蝸觸角故壇迷草鹿生茸要君固有封齊貴赤族當存定楚功漂母孤墳何處是欲將蘋藻薦西風鄂城懷古黃鶴磯頭鸚鵡洲星分軫翼據江流周瑜樓櫓風雲冷庾亮旌旗草樹秋折戟戰餘潮蝕鐡量沙餉絶夜呼籌賦詩橫槊今何在殘月啼烏故壘愁長安懷古西躔東洛建皇都四海梯航稱貢輸楚霸恃強窺寶鼎越裳遵化錫軿車銅駝卧棘侵羌種野鹿銜花叛嬖奴玉輦金輿俱寂寞離離禾黍感丘墟襄陽懷古東連吳會接南荆西引岷峨鳥道青波漲潭溪曾躍馬臺荒郢樹憶呼鷹鹿門龎老遺殘徑峴首羊公有故城零落斷碑風景異至今父老涕縱橫梁園懷古紫氣紅光甲馬營逶迤汴水繞神京侯嬴曾執夷門轡朱亥能移晉鄙兵公子宴春珠結履道君朝斗玉吹笙鑾輿一去繁華改秋雨荒畿磷火生秣陵懷古鳳凰臺倚鎮淮東六代江山指顧中晉邸黃旗曾渡馬金陵王氣已飛龍橋通朱雀連丹闕巷繞烏衣接紫宮王謝堂前雙燕子落花寒食又東風錦城懷古炎火中微建大旗王師頻出劍關西烏蠻地控南雲險白帝城髙北斗齊霸業三分扶漢室雄才十倍勝曹丕神州未復英雄死八陳圖成國祚移錢塘懷古雲開天目界勾陳五衛旌旗拱紫宸甲馬壓潮知北運珠龍沉海失南巡乘鸞王母迷青鳥飛虎將軍卧石麟腸斷蘇堤堤上栁年年春色翠華新燕城懷古廣寒宮殿玉為樓萬歲鰲峰壓九州畨國邊僧青鼠帽天魔宫女綵龍舟鈎陳蒼闕山南拱太液紅橋海北流唯有瀘溝溝上月年年鴻雁不勝秋姑蘇懷古城枕姑蘇笠澤西埀虹橋接草煙迷闔閭老墓騰金虎西子殘池失水犀抉目樹荒羣鹿走捧心臺廢亂鴉啼館娃香徑歌遊處響屧廊空落燕泥咸陽懷古勢踞崤函百二雄阿房樓閣鎮當中坑儒硎谷灰才黑繫頸咸陽火已紅蛇斷血腥空大澤龍成寶氣紀新豐秦功漢業今何處落日沉西渭水東冬至日蒙賜飲膳賦詩律回葭琯已生陽氣轉洪鈞萬國昌五色雲霞呈鳳彩九重日月見龍章官厨分膳羔凝臘宫使頒壺酪泛香病骨龍鍾沾雨露野人無地報恩光除夕柬丁繼善荆門樹色雪初乾客舍年華臘又殘衰朽每蒙明主念旅棲多賴故人安篝痕凝翠香煤暖窗影搖紅蠟炬寒自喜明年春信早鶯花澤國趂歸鞍早朝承恩殿鈞天仙樂奏咸韶三十六竿吹紫簫閶闔曉開黃道轉蓬萊春近玉宸髙鑾輿仗簇紆龍尾宮扇班齊引鳳毛自慶腐儒頭總白御香猶惹舊羅袍燈夕鬢影東風春雪晴又從元夕客江陵輕寒簾幕家家酒明月笙簫處處燈雲擁鰲山金絡索天連鳳闕翠觚稜瓊林歌舞花成陳宴賜黃柑憶昔曾題王粲樓漢燧淪輝鼎未分英雄無地託芳鄰中原紫氣爭龍虎大野玄隂閟鳳麟地控烏蠻通楚澤城連白帝接荆門登臨不盡關河壯醉倚闌干筆有神娥皇廟南狩軿車六轡摧娥皇遺廟儼江隈繡蟠日月雙龍冕翠嵌雲霞九鳯叉眉黯蒼梧迷徑襪淚封斑竹鎖粧臺祗憐父老猶存敬伏臘稱臣撥篆灰關帝廟不憤炎靈國步迍忠肝義膽整乾坤紫髯猶帶風雲色赤驥曾蒙戰伐塵一劍三分存社稷寸心萬死託君臣氣凌華夏曹瞞走遺廟空山薦楚蘋鄱城發舟上荆門霜清繫船楊栁汀酌酒鼓枻將南征魯叟乘桴欲浮海學士揚袂曾登瀛白髮彈冠亦竒節金門獻書惟寸誠玉府牙籖三萬軸摩娑老眼慰平生官果每蒙明主念微臣官果頻頒品味新敕遣翆罌分紫署恩傳玉食下丹宸蜜脾甘沁薔薇露駱乳香浮茉莉春頭白文園多病在愧無詞賦氣凌雲賜衣十日江城雪擁門宮衣頒賜念微臣天機織處經綸密雪錦裁成黼黻新寵被光榮沾雨露暖回衰朽感陽春祗慚蒲栁桑榆景犬馬丹心敢後塵劉彥昺集卷六

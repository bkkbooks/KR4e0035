  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0035_WYG_008-1a, image: WYG1229/WYG1229-0754a.png}
body:
  text: 劉彥昺集卷八明劉炳撰楊維楨評南詞虞美人重遊三山感舊信陵門下簮纓客寂寞頭多白重來無復舊交遊上馬臺邊煙草不勝秋風流雲散繁華去猶指將軍樹長歌何處弔荒丘衰淚凄涼不盡與江流又汴梁懷古春風芳草梁園路玉輦今何處香銷珠翠舊粧樓惟有胭脂井畔水東流傷心太液池頭月清影圎還缺萬年枝上野花開腸斷年年不見翠華來憶秦娥送别溪頭栁青青折贈行人手行人手最傷心處西風重九陽關一曲長亭酒停鞭欲去仍回首仍回首少年離别老來依舊滿庭芳壽許得夫先生白露橫空金風薦爽銀河涼陰西流長庚一點文彩照南洲懸弧當年壯志過庭訓鉛槧燈篝青雲夢黃槐丹桂東井劫灰浮鈎陳迷太液紫駝濛雪玉馬嘶秋悵黍離之感多少間愁短褐歸來老硯生涯舊茅屋滄洲蟠桃􅍄朱顔鶴髮緑酒滿金甌又楊焕文赴召還象闕星辰鳳臺春色觚稜仙掌金莖瓊林侍宴天語記叮嚀日近龍顔開霽紅雲擁雉扇鸞停金溝暖萬年宮樹時聽曉鶯聲賜歸優詔許劍懸蛟影箭委雕翎對寒食飛花流水柴荆自笑投林倦鳥繁華夢誰問功名溪山好船頭載酒醉裏釣絲輕念奴嬌寄徐指揮中天日麗轉洪鈎紫鳯黃龍呈瑞附翼攀鱗登慶會誰是晚成之器擊楫中流聞雞而起多少澄清志斗牛南射寒光炯炯埀地報道玉塞秋髙虎皮雕羽箭西征遼水銘勒燕然頭欲白壯矣風雲英氣他日歸來堂開緑野富貴功名遂故園松菊鄰翁釀酒同醉水龍吟己巳端午海榴庭院初長日梅羽弄陰弄霽驚心莭序艾枝懸緑菖蒲浮碧衣賜香羅憶陪宮宴御爐煙細愧相如多病歸來鬢痕如縷往事風流莫記黯江山舊逰凝睇湘波弔雪楚峰悽黛荆雲愁壘魚腹沉寃衆人皆醉一樽誰酹獨登臨詞客興亡多恨灑青衫淚又題御溝紅葉御溝暖透溫泉栁渾不覺西風早紅葉飛來珠簾搭處始知秋老信步瑤階雁沙香褪襪羅嬌小謾宮袖微揎玉纎輕拾胭脂濕露華清曉寶硯香熏煤麝拭霜毫龍蛇縈繞芳題錦字翠嚬紅怨帶真連草天上人間為慿流水春心多少謾殷勤寄去無情有恨綵雲青鳥卜算子春晚簾幕楝花寒啼鴂催春去芳草天涯緑漸迷煙樹無重數老驥蝢長纓猶憶雲霄路流水孤村獨掩門白日東風暮浪淘沙寒食野徑土牆斜桃李桑麻紙錢飛處亂啼鴉祭餘攜酒去寒食野人家苑樹憶天涯遺恨琵琶銅駝衰草卧龍沙漢寢唐陵無麥飯暮雨梨花又惜春年少為花愁珠箔青樓竹西歌吹古揚州翠袖舞低楊栁月醉倒還留投老憶狂逰往事都休繁華如夢水東流飛絮落花春去也白了人頭滿江紅寄水北山人徐宗周水北幽居抱柴門一溪寒玉山萬疊青林當户白雲連谷乳燕落紅春又晚桑麻三徑多松菊喜新晴布穀又催耕秧分緑牀頭酒何時熟謀諸婦明朝漉謾黃雞炊黍共邀鄰曲舊夢風雲銷俠氣繁華看破知榮辱泛扁舟釣罷晚歸來書還讀醉蓬萊正清秋絳闕華蓋天髙金風銷暑海霽鯨波喜瑞流虹渚黃道星辰紫微雲氣擁蓬萊深處萬國衣冠四夷玉帛兩階干羽雉扇初開嬪妃魚貫九奏簫韶鳳凰咸舞內使傳宣記叮嚀天語喜溢龍顔大地豐登九衢甘雨水調歌頭禁城春闈元夕鳳苑東風早栁眼已催春御溝氷泮微緑宿雨浥芳塵燕子歸來時候寒勒小桃未放初試薄羅新九市閙絃管萬户慶燈辰對鼇山馳寶馬競朱輪綺羅叢中香藹爭道漏聲頻臺榭花隂如晝巷陌月華如海心事翠眉顰舉酒強歌笑獨憶去年人鳳凰臺上憶吹簫丁已中秋感舊銀漢無聲淡雲籠月汀煙落木蕭蕭悵西風萬里江上停橈玉砌雕闌何處霓裳曲鳳管鸞簫休重問傷心往事都付寒潮河橋當年惜别翠雁濕啼痕斂袵魂銷感新愁磊磈有酒難澆行徑紅蘭香歇低顰念暮暮朝朝銀屏悄定應晚粧宮黛慵描木蘭花慢辛酉九日寫長空一雁又景物是重陽甚雨暍東籬數株青蕊未放秋香搘笻倦登髙處掩柴門衰栁映橫塘日暮江聲滚滚西風鬢影蒼蒼當年歌舞翠紅鄉一曲杜韋娘曾擊碎珊瑚玉人扶醉銀燭成行回頭已成陳迹早歸來茅屋石田荒謾把清樽遣興都非少日踈狂春草碧蕪城懷古平山堂下東風何處海棠春瓊花月橋上十里珠簾金叉翠袖歌聲徹醉倒玉人扶銀燈揭莫問舊日江山幾多離别却憶錦帆遊迷宮闕回首故苑繁華豪氣五陵都銷滅斷栁鎖寒煙潮聲咽壺中天幔年少踈狂擬晞髮扶桑濯纓暘谷北適幽燕東通越爭道中原逐鹿抗節登車悲歌倚劍太華青如粟聞雞中夜秦庭曾有人哭誰憶萬里關山塵凝箭羽慷慨嗟髀肉白髮青衫歸故里多少泥塗之辱却羡淵明休官彭澤三徑連松菊迎門稚子殘書老硯茅屋憶秦娥舊春新桃李無情風雨能消幾能消幾一分塵土二分流水劍光羞澀空頻倚舊逰紫塞雲如壘雲如壘壯心零落鬢絲凝縷劉彥昺集卷八

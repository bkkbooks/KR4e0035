body:
  text: 劉彥昺集後序右春雨軒詩集一編諸體大備為詩若干首鄱陽劉彥昺先生之所作也先生以卓越之才際文明之運急英雋之交職典籖草戎檄解銅墨以歸休乎田里故其發於吟詠若是其富有也蓋嘗論之溫柔敦厚詩之教焉逮夫世變相乘與辭偕極要必有正始之意使人得於唱嘆然後為可貴哉離騷而後漢魏之五言是矣晉代以還嵇阮絶出而陶公為至宋齊之世雕鏤益工而興寄彌簡梁陳逮隋風骨耗矣唐之興也雅道幾復王楊盧駱之徒出而陳子昻為至有若李翰林杜工部其得於天分者若殊然皆義存風雅氣摩屈宋體裁漢魏趣挹陶阮詞該纍葉才括數公故卓然為詩家準的若元次山儲光羲王孟髙岑崔皓常建之儔悉盛唐之選也大歷已還名家輩出有若韋栁之髙婉邃雅溫李之瑰瑋濃縟李義山之雄麗許用晦之精切皆偉然而自拔整轡徐驅而方駕者之所馳騖規規然意恐役賢者也先生乃約數子之長成一家言以隮夫盛唐之閫奧其哀余忠宣之類則又逼夫漢魏矣蓋其言與事稱有不期然而然者宜夫延譽於大方髙踏乎一時膾炙乎文人之口洪武戊寅先生以為詞源之沛夫江漢而雲夢之足觀逰也挾其所輯以來大蒙賞激雖駿骨之市燕照乘之寶魏連城之歸趙不足方也先生之幸㑹可謂厚矣遂鍥梓以傳則先生之精瑩將遂不朽而膏馥於後人者博哉庸敢托其崖略蔽以管窺編諸末簡以備後序云爾是歲二月晦日汝南周象初述

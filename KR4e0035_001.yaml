body:
  text: 劉彥昺集卷一明劉炳撰楊維楨評賦歌風臺賦岱嶽截雲黃河觸雷豐沛曼衍青徐縈回數仞崱屴九層崔嵬危基立壁疊砌欲摧雨剝沙石烟棲莓苔野樹銷沈隂雲晝霾征馬過之振鬛而躑躅飛鳥欲度斂翼而悲哀顧父老而問曰兹所謂漢髙皇湯沐之邑歌風之遺臺也耶想夫坑灰未冷漆烟尚凝使者獻璧滈池告靈沙丘之轜車未啓四海之鮑魚煽腥望夷鹿失草澤蛇驚西郊之鬼母屢泣芒碭之龍氣已成爾其寶劍始握赤幟一麾龍吟而風雲奮激虎嘯而草木靡披陳涉感鴻鵠之歎張耳動燕雀之悲燕趙摩壘齊魏偃旗于以率三軍之衆于以陳九伐之師拯生民於水火蘇大旱於虹霓逮夫關輔前驅函谷既闢轟雷隱鼙長雲列㦸殺氣填空腥烟簸礫劍光迸星麾幢蔽日熊羆震駭虎豹悸栗一戰而土崩瓦解再戰而揚沙走石天地為之低昻川海為之蕩潏及夫董翳授首章邯失律諸侯主臣俯伏喘息山東豪傑知入關之先子嬰繫頸降軹道之側所謂百二全秦之山河黯其無色矣想夫隆凖龍顔豁達大度扶義而西莫不景附囊括圖書封籍府庫玉帛無所取子女無所顧示三章之約法動萬民之鼓舞化呻吟於謳歌同赤子於慈母慨相見之何晚恐延留之不固若夫項王喑啞萬人皆廢方其入關莫敢仰視一舉咸陽三月之火益重金刀九鼎之勢及漢軍於霸上宴鴻門於兒戲將軍有意於督責敢不逡巡而辟易等餧肉於虎口同埀食于魚餌張良獻玉斗以請成亞夫示寶玦而肆志衝冠已見於怒髮斗酒何辭於生彘繫成敗於毫縷睹天地於一擲嗟夫垓下之歌騅兮不逝徒喑嗚增蓋世之雄知忠厚有回天之力固韓越之告功亦蕭曹之成計也及其羣雄既削四夷日寧定都宏宮室之制推功誓帶礪之盟論三傑有股肱之效致四皓有羽翼之成想其寬民愛人雄吞八荒已化家而為國念桑梓之莫忘六轡既啓八鸞載將黃屋前設紫蓋後張翠華耀虹霓之彩金鉞晃日月之光干羽舞于兩階旌節列於五方千官景從萬騎騰驤馳道塵清於草色輦路雨霽而春芳駕鼓車於槖駝奏簫韶于鳯凰宮仗璀璨仙班琳琅爰止舊都旋歸故鄉萬姓嵩呼里閈輝煌父老歡騰而謳歌兒童駿奔於壺漿㑹故人而置酒因起舞而增傷登高翹首指顧搴裳悲壯慷慨感昔倣徨須千秋之萬歲終魂魄之來翔威已加於四海德咸被於萬邦慨猛士之何在思守成於四方瞻雲氣之昭回歌大風之飛揚思示警於來裔闡制作於非常乃命太史協吉呈祥高山是甸因阜為岡厥土燥剛厥位面陽既經且營爰度而量繚版幹之矗矗勒畚築之鏜鏜萬杵既殷百庸克襄咸鳩工而畢事爭輸力而踉蹌何經始之不日宜庶民之交相也嗟乎姑蘇壯麗銅雀迤邐構炫日之雕題貯如雲之歌妓奏午夜之歌鐘艷三春之羅綺恣聲色於荒淫塗生民於膏髓終麋鹿之來逰亘後世其誰齒孰若我皇海宇一匡安不忘危內修外攘仁以為紀義以為綱禮以為隄智以為防卷抔土奠乎九域䇄八柱表乎中央所以成漢家四百年之基業埀鴻猷於萬代而無疆也太史評曰備盡漢事惜用韻未純耳修竹賦繄緑竹兮修修羅生兮庭之幽體匪草兮匪木質克剛兮克柔非分幹兮淇園之澳必濯根兮渭川之流爰貞心兮自守故堅莭兮獨遒凌霜雪兮素操不改假雲烟兮繁隂愈稠豈競芳兮桃李欲干勢兮斗牛清韻兮戛玉寒光兮翠浮動西風兮三徑夜雨淡明月兮空庭暮秋其清也巢由兮未擬其直也史魚兮莫儔其虛也顔回兮屢空於陋巷之下其癯也夷齊兮不食於首陽之陬亦托跡於蔣詡曾結知兮王猷唐六逸兮是隱晉七賢兮實逰或述典謨兮傳簡於翰墨或托宗廟兮列籩於庶羞或同勛兮桑弧或協律兮鳴球宜比德兮君子終化龍兮莫可留也極遐思兮仙子終驂鸞兮莫可求也亂曰君山暮兮湘雲飛洞庭波兮春離離吹參差兮增我悲洞庭波兮湘水深竹上之淚兮秋隂隂歌滄浪兮傷我心太史評曰語意清麗可讀操箕山操堯讓天下於巢父巢父曰君之牧天下猶豫之牧犢吾無用天下為莊子有樊仲父牽牛飲水見巢父洗耳驅牛而還恥令牛飲其下流也清流泱泱箕山之陽樛木森森箕山之隂嗟嗟巢父豈洗其耳實潔其心評曰結語是崩城操杞良妻杞殖妻妹朝日之所作也殖戰死妻哭而城崩遂投淄水死其妹悲之朝從城上哭長城與雲齊暮從城下哭長城化為泥嗚呼城已崩兮猶可築夫君死兮身可贖妾寧化魚淄水底立廟祀君君血食石婦操即望夫石也悲其夫之不還也朝朝山頭望日日願夫歸夫君不歸將疇依妾身已一難再失寧向山頭化為石山崩石應墮江水千年萬年清到底評曰言婦節也前旌操衛後母子夀母欲殺前母子伋而立夀使伋乘舟將沉而殺之夀知之與伋同載舟不得沈又使伋之齊令冦見載旌者殺之夀又竊旌前行盜見殺之伋載夀尸還亦死同舟幸濟兮豫豈無咎前旌喪原兮盜莫之究仰叩天兮青青俯呼地兮冥冥爾由我死兮竟沒身於無罪豫敢愛生兮致淑德於無旌嗚呼兮已輿尸于故國誓甘執鞭兮九京評曰可怨殘形操曾子夢見一貍不見其首作夢生於觸兮貍偶異形吉凶有定兮夢胡足慿嗟嗟巫咸兮不疑何徴履霜操尹吉甫子伯奇無罪為後母所讒見逐集荷為衣採楟花以為食作歌投河而死嗟讒言之構兮父豈無知父將不聞兮母心則離朝履霜兮夕採楟食撫二弟兮惟順弗違嗟嗟蒼天兮父母孔安兒兮兒兮死奚以悲評曰可謂仁言桑中操魯秋胡仕陳歸見採桑婦悅之以金婦不從及歸見母母呼妻出識之醜其夫行遂投沂水死之秋胡歸陳息桑隂兮見彼美姝悅以金兮重色忘親何荒淫兮嗟彼丈夫無忸心兮婦以義决誠千載之針兮精衛操炎帝女溺死滄海化為精衛日銜西山木石以填之怨溺死也海石白凝雪海波青照天銜石填海無窮年但願滄海揚塵化為土爾無寃兮爾無苦劉彥昺集卷一

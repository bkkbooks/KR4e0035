body:
  text: 劉彦昺集巻七明劉炳撰楊維楨評七言絶句題葉楚庭醉漁巻簡彭敬宗劉子原子載子明落盡荼䕷草覆裀二分流水一分塵小車都載鵝黄酒蘇小墳前醉過春渴眠篷底口涎流麴蘖為池糟作丘便向五湖乘浪死墓題應得醉鄉侯京口中秋歸棹前年酒滿缸牽衣稚子慰離腸却憐月色連秋色依舊他鄉憶故鄉奉天門進膳江上風髙未授衣金溝楊栁得秋遲不因宮宴糕糜粥客裏重陽總不知出龍灣之東阿行李蕭條出鳳城鄉閭漸逺不勝情客舟今夜寒橋泊腸斷江流作雨聲京城元夕五年無路掃梧楸夢裡闗山只淚流誰送寒燈到先壠異鄉明月故鄉愁泊𤓰州懷舊寄顧利賓王又新隱居潮聲月色滿江船回首春風十六年憶得石橋楊栁巷珠簾銀燭聽歌眠京城題家書後示善鄯諸姪時玉珊自西河歸莫遣春泥汚短鞾莫將鵝鴨惱鄰家窓前好種芭蕉樹寫字題詩寄阿爺虎牢雁門通馬邑酒泉黑水接流沙憐爾西行一萬里且喜除夕得還家别時纎手牽衣送想見了鬟似漆光莫向堂前惱阿母海榴窓下繡鴛鴦短褐欺寒雙鬢迷當門新築野墻低何時傍竹結茅屋與爾長吟烏夜啼經露筋祠珠湖烟雨散晴暉帆落風輕短棹遲春草斷垣斜日裏行人猶說露筋祠望丹陽郭經楊子橋楊子橋邉楊栁新青帘斜照送行人明日揚州看花去祗憐不似舊時春暖風晴日丹陽郭處處東風是舊遊記得杏花寒食候紫簫紅袖宿江樓題舅氏亭簡朱原立陳遂良陳原輔渭陽池館花如霧曲曲䦨干面面池記得少年遮妓飲至今楊栁學腰肢同周伯寧連榻劇談悲歌有感醉來抜劍斫珊瑚懶向侯門更曳裾夜半聞雞眠不着草堂秋雨讀隂符漂零書劍愧無成日夜秋風白髪生倘得黄金三萬兩肯將籌策譲陳平東湖憶舊簡劉子雍胡伯清汪宗彝蕭家巷口花如霧紅粉䦨干酒斾斜記得少年曾繫馬如今無樹可啼鴉離懷寄汪宗彝楊孟瑄魏居敬綠樹啼鴉春又歸雨晴山徑濺香泥楊花不似離情薄猶趂東風逐馬蹄埀埀江雨作春波江上行人晚唱歌莫遣青燈照衣袂酒痕不似淚痕多墓草寄斯貞姪江上飛花處處新春山啼鳥似呼人可憐愛酒無虛日忘却劉伶墓草青送黄彦美還㑹稽彦美常從故侯買里古思以兵守越後雪仇報恩一時稱誦君去應須到㑹稽故侯墓上草離離信陵門下三千客零落東風更有誰少年賓客東南盛金錯龍泉手自提今日蕭蕭鞍馬裏五更趨府候晨雞暮春寫懐四絶晴雪飛綿栁樹斜雨餘紫陌净無沙春衫日日騎官馬兩袖東風看落花宮筵題就送春詩簮筆承恩出殿遲病目塗鴉不成字粉箋香墨惜烏絲揚州書記鬢蒼蒼每向春歸欲㫁腸剩欲典衣酤酒飲風流無復少年狂青梅煮酒蕨芽肥倦客懐家入夢思想得故園風景好一庭香雪落荼䕷劉彦昺集巻七

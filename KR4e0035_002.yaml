body:
  text: 劉彥昺集卷二明劉炳撰楊維楨評五言古詩擬古今人多結勢古人多結心結勢可趨利結心能斷金金堅義亦固利厚害彌深往者不咎昔來者當鑒今得漢彝簡周伯寧索香灰古彝多欵識蟠螭漢篆存黃金銷土色翆羽蝕雷文綺席流寒月銀屏度綵雲蘭灰能裹寄長吟晝夜分春夕直左掖懷周侍郎晚雨池上晴逶迤淡將夕金莖華月生綺樹流雲濕窗虛漏聲永幔捲爐烟襲憶我同袍人何由共瑤席簡孔博士宿雨曉還歇開窗銷鬱沈烟光藹芳樹池上鳴幽禽逶迤瞻郡齊窈窕期盍簪孤懷屢百積羣疑思一針何時聨夜榻春漏委波聲評曰倣韋也左掖門朝退呈吳待制諸公謬忝金閨籍聨班趨晚朝逶迤西上門窈窕長安橋殘雪帶逺樹夕陽在山腰不有同袍者疇能慰寂寥張禮部卧疾殘雪晚還霽窗虛斜日回故人久卧疾空階生緑苔兒童諳藥裹吏牘委塵埃浮榮每為幻長嘯望層臺别京邑之東阿前年别鄉閭今年出京邑悠悠去江漢杳杳事行役所懼心志違况此風波急烏啼楓樹烟雁下蘆洲夕回首望長安蒼茫寸心失憶園廬種園在東臬草荒瓜蔓長日落秋樹凉搴衣獨還往時逢野老憩自足田園賞沿溪暝還歸古寺烟鐘響示宜學績學甲戌三月題阿爺五十四憐汝才始生恩育夙夜謹眉目秋水清行如生鹿跳語若流鶯鳴常時恣嬌頑計日期長成爾祖豪傑姿聲聞州郡欽一顧等成敗片言能重輕田園亘阡陌兵火成榛荆千頃遺寸波百田才一塍官租因訟致薄業寧躬耕不辭生理苦所懼徭役并嗟豫早失怙慈親訓遺經遭時風塵黑扶日雲霄青簪筆侍禁闥通籍居承明衰年遂冉冉薄宦徒營營辭官歸故園葺屋依先塋看花眼如霧種竹髮已星貧無金在囊家有書滿籯念汝未强壯立身恐伶仃痛逼骨肉懷感慈肝膽驚男兒在忠孝業學崇勳名題詩冀汝識慰我桑榆情賦清華堂詩皇威戒安逸翰苑遊神機天球列東序玉藻羅北扉蜒蜿紫氣潤璀璨虹光輝奎彩動黃閣文光照彤墀鼓枻洙泗源遵舟伊洛湄梁追昭明轍漢軼東平輗瀛洲浮暖吹銀潢演春漪芝蟠五色葉桃發萬年枝墨沼鵝羣浴書林燕子飛花隂移鶴仗竹色來鳯儀共沐恩波潤咸蒙聖澤滋河清仰文化同軌固磐基聽雨堂為安成周氏賦中年迫宦遊邈若胡與越悠悠烟樹遙杳杳關河絶况兹風雨夕坐惜鴻雁隔篪塤寧共理孤燈耿還滅懷寶重經濟括囊貴明哲何時對牀眠慰此腸內熱敬軒詩為王達善賦深巷何窈窕端居掩柴荆素心每無欲寡朴輕浮榮慮靜默自守神清淡忘形危坐白日晚踈林微雨晴開窗幽鳥啼滿階芳草青焚香奏絲桐愛此銷塵嬰孤雲野鶴唳絶壑流泉鳴髙懷曠而婉雅音誰復聽古人良已久寸心千古情郡齊宴集詩呈徐用中廣文諸先生郡齊文墨暇履端集朋曺春意藹萱草臘痕封栁條窗暄書蠧散簾深爐麝飄嘉園剪新韭芳壺湛清醪青甘浮橄欖紫馥吹蒲萄舒此羇旅况豈夸樽俎豪禮簡貴情厚心親自神交所念萍水逢回首江漢遙何殊瀛洲步未讓淮南招俯仰慰夙慕綢繆幸今朝題詩謝永好蕪詞慚草茅聞魯志敏訃音故國猶傳箭中原未解戎遙聞故人死雙淚落秋風五言律詩題呂花園草堂朱雀橋何處銷殘暑城南茅屋幽晚烟將野色春樹帶江流愛竹從兒種耽杯與婦謀生涯成老圃不是故時侯郊居雜興柬陳遂良桃李漫成蹊茅堂習隱棲泉聲溪碓急山色野牆低相頷原非燕圍腰底用犀不嫌生理拙抱甕灌吾畦風雨行人少柴門午上扃土花沿砌碧山果墜枝青病眼耽書癖衰顔托酒星經邦方上武寂寞抱遺經題朱澗槃卷遙峯連碧澗茅屋俯青林徑晚花粘屐松寒雨潤琴酒甘和菊釀詩苦帶茶吟却憶文園老歸來雪滿簮寄子升必昭昆季烏石山頭路秋風已送凉野橋苔浸碧雲碓稻舂黃扇影搖衣桁書聲出草堂惠連無俗事埀釣濯滄浪夜直呈翰林諸友中使傳金鑰嚴兵戒紫扉月高旗影直風急漏聲微鵲倦驚龍燭螢閒綴鳯幃不眠瞻北斗拜舞敢遲違六言詩歸舟懷善鄯廣海未回梅子黃垂雨霽榴花紅簇風輕天際歸舟何處日暮柴門自扃歌憶杯痕蟻緑鬢憐鏡影鸞青心折少年塵夢絳囊夜照流螢秋夜對月寄汪宗彝宮樹凉生絳闕玉階影轉銀河曾侍梨園供奉夢魂猶記笙歌抗節誓清瀚海請纓願繫樓蘭塵澀腰間白羽猶思射虎南山辨舌曾歸白璧酬恩盡散黃金范叔綈袍誰念悲歌自爨瑤琴薄技寧為雞口雄心每倚魚腸弊矣布袍雙袖御爐猶帶天香拜墓發京柬張子鳴表弟蓼莪之詩可讀風木之感無邉天涯不堪為客墓傍猶未有田思親不堪泣涕匡時未有勳名斷機之訓猶在牽裾之恨幾成劉彥昺集卷二

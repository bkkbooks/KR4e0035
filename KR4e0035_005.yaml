body:
  text: 劉彥昺集卷五明劉炳撰楊維楨評七言古風經撫河遇雪舟中睡午方起沙溪風寒飛雪狂風大不敢開篷窗蒙頭裹被睡過午柁底浪急聲舂撞岸上楓林茅屋小新年家家無米糶土竈作炊烟滿船灰壓濕薪蚯蚓呌山僮不諳途旅艱靴綻衣薄雙眉攢艱難末路乃如此富貴有夢真邯鄲却憶瓊林侍宮膳雪花不入黃金殿酒上朱顔萬國春花簮烏帽千官宴錦箋彩筆賜題詩仙仗頻移出苑遲衣惹御香羅袖窄馬蹄歸踏杏花泥弔晉安將軍歌荔枝城頭花簇簇王孫不歸春水緑黃金臺前烟草荒傷心獨倚青雲哭淚灑鑾江江倒流楚魂暮咽楓林秋蕉黃醑緑湘竹語峴山石斷行人愁信陵門下簪纓㑹珠履筵前幾人在軍中擊鼓夜不眠珠翠成行鳴劍佩王孫王孫真貴人落筆龍蛇驚鬼神千金散士馬蹄盡鐡甲晝卧雙麒麟桑柘隂隂連大路野市書聲晚當户部曲凄凉白髮稀甘棠猶指將軍樹玉鳬金雁漆燈殘化鶴千年何日還有酒誰澆趙州土碧血化雨苔斑斑王孫王孫不可招仰天擊碎青桐瑤寸心何處寫哀素江上年年生暮潮評曰可哀承承堂為洪善初題天狗蝕月嵗靖康血戰于野龍𤣥黃神鰲夜泣九淵沸翠華日薄寒無光主憂臣辱誓萬死直以隻手支扶桑燕山六月雪花大節旄零落肌膚傷關河蕭條月色苦秋風揚沙吹雁行子卿歸來典屬國茂林樹老愁雲荒至今勳業昭簡册大書特書遺典章承承堂前春晝永牙笏金魚堆滿牀芝蘭玉樹競娟秀陶令松菊凝秋荒盈缸釀酒介眉夀槐隂覆階萱草長忠宣盛澤實具美宜爾子孫宜爾昌題磨崖碑後錦囊粉黛銷塵土香冷春迷山下鬼梨園弟子散如烟六么誰按霓裳譜梧桐蕭蕭秋雨愁君王歸來多白頭宮牆瓦落芙蓉苑輦路塵蒙華萼樓牝雞司晨古之訓九齡先識非阿佞漁陽鼙鼓蔽黃埃臨洮戰血生青燐二十四郡何無人但恨不識顔杲卿國忠既誅林甫死勤王義斾趨咸京唐室安危誠再造汾陽令公國元老萬邦歸正泰階平九廟無虞靈寢掃大筆特書昭日星龍蛇剝落莓苔青嗚呼浯水瀉遺恨父老至今雙淚零評曰直是能寫題方壺畫為斯貞姪賦巨然畫與書法同縱筆所至生秋風墨飛元氣瀉沆瀣青摩斗極連崆峒逺岫平林斷還續苔根斜迸山泉緑釣倚丹楓野老磯門埀碧栁幽人屋壺公騎鯨白雲鄉壟樹緑泫烟草黃風流文采今寂寞對畫泪痕沾我裳大梁行大梁繁華全盛日宮闕浮天耀桃李魏國山河十萬兵信陵賓客三千履上苑春晴花覆闌鬭雞走馬事金鞍銀燭填街美人過紫蓋凌雲公子還五侯七貴行人避吐膽傾肝論意氣朱亥能移晋鄙兵侯嬴自執夷門轡回首英雄非昔昨輦路人稀秋草迷舊游歌舞今何處落日狐狸當樹啼評曰效盛唐者題蔡宗文趙氏譜牒後苔連椒壁雲痕濕霓旌無色金仙泣杏花依舊落胭脂梁苑凝烟春草碧相逢倣佛說前朝譜牒香遺古錦幖前代王孫今老矣天潢如髮際雲濤漢之季哀故御史余公闕守舒城死節而作漢之季洪流何湯湯赤子為龍蛇蔓於漢於淮割我城邑圖不祥天子曰嘻豫何以奉宗廟朝羣臣登明堂曰豫近臣御史闕咨爾撫師古舒國閫以外爾制之賜爾三百衛士斧與節毋黷民毋究刑茍附而安文武並用禮之經臣闕昧死頓首泣主憂臣辱敢不力御史騎馬來萬姓泪落喜且悲豫我塗炭民漢官威儀今見之東市牽牛羊西市羅酒漿紛紛列道左御史下馬相扶將諭以天子聖且愛明見萬里外宵旰不遑食兵爾饑爾苦顛沛御史雖愚頗知忠與慈惟爾患難相扶持鼓爾鼓旗爾旗疾則疾徐則徐壯者戰守老者居俾爾農桑毋奪時桑青青麥茫茫牛羊走丘墟御史城上行茅屋人家聞讀書以心感人心敵至輒敗不敢窺城東啼虎豹城西嘯熊羆蘄黃攻始退山越什什伍伍來相圍裹瘡戰城南吮血戰城北大船小船捍江列嗟城中如流魚御史奮臂城上呼悲風揚塵沙起白日無光士爭死廪無粟士氣衰朝食城上草暮煮城下箕癘疫相枕何流離御史斬愛馬士卒不忍食日久援不來矢盡兵殘益危迫梟騎死野戰烏鳶銜肉流尸殭孤城坐殄瘁土山地道不可當御史誠不德握手謝父老爾民多殺傷御史登城北面拜稱臣萬死無以報陛下闔室竟與城俱亡楚山蒼蒼楚水洋洋御史之節功烈顯彰天之奎璧地之河嶽人之綱常千載弗渝日光普光誰能置廟復立社享爾祀爾百世及天下評曰音節古甚足為余公傳誦之古意可哀琅然漢魏之音經白將軍故第粉牆將暖日依舊栁條新上馬臺邉路春風無一人畫梁暗巢雀綺席委芳塵桃李東園夜餘香斂翠嚬評曰可念可怨瞻雲堂為淮西李仲良賦生逢兵革離鄉邑故家門巷兒時憶壠上蒼苔覆墓田城西喬木連寒石每憶年年寒食時輕烟冉冉落花稀墳前斗酒無人酹沙際殘碑有字題漠漠長河孤鳥沒九泉路杳嗟何及銀雁秋沉落木黃金𧖟春暝寒泉碧漂泊緇塵幾日歸故衣線斷感春暉終天一掬松楸泪心逐孤雲日夜飛評曰孝思之念題呂花園草堂代宋景濂先生作官馬烏鞾春踏霜鐘聲催眠趨玉堂黃金帶重覺腰瘦錦袍淋漓宮酒香殿前草詔東風急紫硯光凝墨花濕承恩簪筆立多時華髮蕭踈倦無力聞道城南舊草堂景勝林幽引興長碧連淮甸晴波暖青割鍾山曉樹凉種栁萬條金覆井栽桃千幹粉連牆薔薇壓架綃囊綴芍藥當軒錦幄張箇箇麝香眠石徑雙雙翡翆浴蒲塘紅殘蝶翅翻風靜緑暗鶯吭囀日忙游絲飛時寒食早車馬城南爭拜掃夕陽影裡賣花聲游人半醉眠芳草壚憶黃公酒斾斜竈遺陸羽茶烟裊何時休沐振鳴珂紗帽輕衫試越羅信筆詩成還倦寫憶爾當年郭槖駝評曰風致有度寒食客秦淮憶舊去年寒食長途客桃花落盡梨花白今年寒食客秦淮杏花李花無數開東風凋殘白羽箭落日獨倚黃金臺緇塵蕭騷吹病目破帽烏靴泥漉漉藜杖東山弔謝安悵望飛雲仰天哭凄凉心事更誰憐緑綺可以調絲絃子期已矣伯牙死髙山流水空荒烟王孫不歸芳草暮解衣沽酒驅愁去誰言一醉可銷愁酒入五腸肝膽露便擬揚帆析木津仍期掛劍扶桑樹志士長懷溝壑憂功名百歲等浮漚雨晴浪暖河豚上載酒滄江弄釣舟題夏慱士晋王羲之右軍像上東門外胡雛嘯萬里塵飛洛陽道濳龍東渡晉中興羣馬南浮國重造石城巃嵸昔所都庶事草草嗟良圖衣冠簡傲禮樂廢朝廷放曠君臣踈大令平生最超卓早年門第居臺閣內史新除典要樞右軍任重參帷幄擅場翰墨出神奇蔡衛鍾張早得之晝長燕寢森兵衛日暖鵝羣戲墨池來禽青李囊盛寄裹鮓黃庭醉後題春風三月山隂曲羣彥流觴映修竹一時簪冕屬髙風百年文藻懷芳躅流落斯文慨古今後代宸聰復購尋小字昭陵傳玉匣數行定武抵千金忽見畫圖雙眼失采采丰神驚玉立羽扇蕭踈晚日晴烏紗倣佛秋塵襲繁華如夢轉頭非典午山河幾落暉唯有鳯凰臺上月春風依舊紫簫吹評曰晉人風致墨池謠簡錢本初夫書未可易言也鳥蹟既兆蝌蚪出焉天雨粟而鬼魅泣河圗出而龍馬傳八卦畫而結繩解三才著而文明宣漆書汗簡去古益剝落魯魚亥豕讀者窮磨研湯銘商彞仿佛欵識在秦封石鼓但見鎖紐連六經多舛誤去聖逾千年倉頡莫可考史籍何茫然李斯程邈更古制篆𨽻分草如雲烟王次仲氏作楷法趨時簡易隨方圎蔡雍夢神授八法鍾梁張李尤精專中間作者不可數太令小令聲名絶今古何天經地緯而山峙川融亦玉振金聲而龍翔鳯翥草字貴尊嚴真字貴風度大字貴結密小字貴寬裕樂毅論太史針筆力殊正直嚴嚴乎忠臣烈士之心告誓文曹娥碑其容何莊敬肅肅乎孝子順孫之儀孤雁賦逍遙篇興趣托髙逺出塵拔俗何翩翩洛神賦畫像贊姿儀特間雅恭肅莊矜誰敢犯是皆見義以成文非獨擅場而觴濫歐虞禇薛栁與顔方駕並軌何桓桓米蔡蘇黃尚嫵媚趙松雪公真傑出大書特書勒金石清苦平生非一日崑山春早鳯雛鳴溟渤霜寒海青出前輩落落如晨星慨古閉門芳草生年來此事知者少隱几看雲數歸鳥庭樹迎秋落葉凉墨池經雨蒼苔繞錢郎一年相别多過我顔色如春和臨池刀筆已豹變滿紙墨汁翻鯨波燕子日長休懶惰莫向清風北窗卧有鳥不鳴一鳴驚人有鳥不蜚一蜚冲天後生可畏未可量也一羽雲霄期勉旃評曰又是一體豫昔與孟思魯參戎事於三衢監司宋公幕府及兵潰得間道還鄉遂歸休之志故歷叙之嗟嗟漢燧昔沉耀橫流版蕩糜中畿鬼母啼烟赤電走天狗墮地金石飛勤王涕沾臆義斾懸雲昭白日劍擊風雲向夜悲楫誓山河仰天泣君當少年功節殊短衣倒騎生馬駒蠻箋草檄墨慘淡寶刀斫血腥糢糊奏凱對花歌窈窕量沙卧雪宿氍毺運籌制勝常輕敵憑軾降城不顧軀幕泛碧油陳雅樂漏殘銀燭合兵符孤軍轉戰經千里蕭條榆塞塵沙起秦樹關河落日低漢營鼓角西風裏婺女妖氛壓斷牆嚴灘殺氣連重壘羽書援絶鬭兵稀古道無人畏蒺䔧霜銜白骨饑烏下秋入金瘡敗馬嘶虞姬帳下將軍死公子門前壯士歸去國共憐王粲賦望鄉同擬杜陵詩壯志無成還故里城西茅屋苔痕紫鈎簾聽雨更焚香柱笏看雲時隱几自信胸澄渤海清寧憐氣與嵩華比破浪誰擒北海鰲穿林學射南山雉笑傲行將下澤車經綸懶取圯橋履草荒三徑掩衡門舊事相逢不忍論兩鬢緇塵銷歲月一雙臘屐信乾坤湖上雨晴飛落木與子登臨散幽獨杖藜出郭踏江沙一笑尋僧看修竹評曰激烈悲壯老馬長鳴潯陽行江頭女牆啼野烏亂石如壘驚濤呼潯陽九派控吳澤匡阜千峯回楚墟當時形勝夸彊土連雲宮苑旌旗樹庾亮樓船赴國仇黥王版籍歸英主盛年一去水流東冠蓋繁華處處空兩岸蘆花浸明月滿汀烟樹鳴秋風古戍何人晚吹笛客船莫向城邊繫翆袖琵琶夢已寒青衫易灑天涯泪評曰效高適王維者青藜軒為劉子雍賦頗聞天祿青藜杖雍也自是今劉向漢啓炎精著五行天符火德明文象太乙光分五夜深卯金氣應三台上草堂人稀清漏長紫薇花開金井凉昭回雲漢星辰爛黼黻文章雨露香鏗經九節蒼虬幹叩門絶愛齊眉短桃竹風清豹髓凝葛陂春早龍膏暖銀燭無神暮雨凄金蓮落艷秋烟滿故人文彩筆如椽制作干今軼漢賢萬里羽儀調玉燭九重柱石際凌烟秦淮書舍為端孝思賦秦淮水金溶溶羣峯迤邐以走北萬壑曲折而朝東盤礴之秀山川所鍾金精伏地斗牛爛王氣燭夜風雲從以之定九鼎制萬國鳯臺鵲觀之壯龍蟠虎踞之雄春風三月城東路紫陌紅塵映朱户萬樹嬌花駿馬嘶千條弱栁流鶯度楚榭春粧玉襯鈿秦樓夜宴金搖步鬢墮秋痕曉霧輕眉分晚黛朝雲妬洛下誰論杜牧狂臨邛不數相如賦故人結屋對江波厭聽朝朝玉樹歌白苧裁成朝隱几黃庭寫罷晚觀鵝藝窗太史三冬足日閲牙籖常百軸志篤孫康映雪勤心濳車𦙍囊螢讀舌捲波濤隘五湖氣雄島峙吞三蜀南金赤箭如圭如璋泰山北斗景星鳯凰有志未可量也期爾萬里風雲翔評曰公子而文乎江都行蕪城繁華天下美處處離宮鬭紅紫綵女龍舟錦作帆內官鳯苑花裁綺芍藥珠簾十二重楊栁御堤三百里鼓車巡幸翠華留夷夏梯航覲冕旒縣邑貢真三祝獻諸侯稱夀萬年酬盤游酒色何窮侈宴安鴆毒亡邦祀西苑歌鐘午夜遊東遼輜重三軍死寶成殿上奏鸞棲晉陽城外飛龍起故國傷心非昔時五雲宫闕草萋萋東風寂寞雷塘路月暗秋陰鬼火啼評曰唐體寄徐宗周兼柬楊煥文阮宗泰李家池頭去年别大風揚沙天欲雪贈我鯉魚三十腮楊栁穿來帶寒血今年八月芝山樓我欲少住君不留蹇驢落日冒秋暑鬢絲汗溢黃塵流近過阮公茅屋底說君沉痾幾不起九月十日方離牀强健近來差可喜相望片雲危石山來往每嫌消息艱斯文凋謝少知已恨不連牆相往還却憶少年從義日聞雞不眠追祖逖殺敵風吹寶劍腥打圍雪壓雕鞍濕諸葛曾懷漢室憂包胥亦有秦庭泣投老相看海嶽清夙昔患難同離情歸來廬井有桑梓拜掃丘墓除榛荆傳家書在晚還讀負郭田深春自耕愛君窗前修竹大聽雨何時對牀卧却扶藜杖過楊兄使酒怕渠時罵坐氣略頗與常人殊天經地軌談陰符黃岡溪頭懶埀釣未央殿前思上書功名定有國士報肝膽好將民瘼蘇黃金之臺一千尺白日橫飛虎生翼呂望八十方致身五十富貴朱買臣時來勳業自有待豈得甘作漁樵人澶州行澶州城頭河水渾南城北城如虎蹲當年敵人犯畿甸烽火照夜驚邉塵廟堂大臣惟肉食幸南幸蜀俱身利臣瓊歷練老知兵臣凖忠肝陳讜議九關半夜一雞鳴大駕南征詔書出虎臣武將爭駿奔龍旋豹尾如星屯六軍野宿犯霜雪萬乘路次昭風雲金莭翆支先六轡黃蓋城頭壓妖彗天戈曉渡國威張神箭星馳敵將殪重瞳一顧轉乾坤萬歲山呼震天地敵人氣懾不敢當稽首俯伏稱誠惶三邉清寧海波霽四野桑麥紛牛羊至今惟有萊公廟簫鼓年年歌歲康評曰曲盡事實可哀可誦題李陵蘇武泣别圖臣有千古哀覆水一去難再回臣有三寸舌染絲一黑難再白丈夫瓦裂聲名虧漢不我得將安為吞聲長途送蘇武忠肝惟有青天知烟沙蕭條壓氷雪心事凄凉淚成血誰憐寃魄老邊塵空有丹心瞻漢闕目斷關河夕照迷茂陵烟樹草萋萋將身不似雲邉雁猶得年年故國歸評曰可痛可痛題諸葛武侯廟武侯古廟臨江市碑仆苔荒字殘廢巴西巫峽長父老至今來拜祭木牛泥馬將何施君才十倍當曹丕託孤付國寄大事輔不可輔卿為之股肱竭力誓臣節五月渡瀘親出師君臣氣義出肝膽千古泪落令人悲江流不盡潮聲咽嗚呼遺恨三分國沙際空遺八陳圖蒼梧雲暝秋蕭瑟評曰節義如生義士歌鄱陽胡公字振祖當元之季以義起兵尅復郡治紀功授饒州府判後從官軍轉戰至浮梁與敵相拒糧盡矢絶義不辱憤罵以身死之鄉貢蔡淵仲先生為之立傳豫作歌以表其節義焉至正甲午也昆崘晝裂黃河决京畿地毛白於雪鬼母啼秋天雨魚武庫兵鳴劍飛血黃屋播越烟塵張四海感謝思勤王鄱陽胡公軀七尺義旗塞路寒無光鳶肩火色萬里壯虎氣電目千夫强城頭陳雲壓鼙鼓釃酒椎牛題露布破金沉船曉更征囊沙壅水宵還渡萬乘千旟驃騎營轉戰直薄浮梁城孤軍糧絶朝餐草間道人稀夜煮氷鐡甲照霜弓影曲寶刀磨月水痕腥旄頭芒射前星落恃勇驍騰身不却凄凉馬革裹尸歸誰復聲名寫麟閣郡侯紀績茟如椽父老相傳泪泫然三尺荒墳何處是忠臣後代子孫賢評曰義氣悲壯可念題崑崙雪曉圖自有宇宙便有此山六丁智力憚疏鑿一氣神秀鍾巑岏九龍上蟠日月麗六鼇下鎮滄溟寒西母雙鳬逺莫至周王八駿遙難攀萬仞皚皚太古雪大明中開爛銀闕玉京瑤圃恍瀛洲一洗胸中煩惱熱自非砥柱障狂瀾大地蒼生混魚鱉摩挲此圖雙眼開令我胸次生崔嵬安如磐石奠四海長歌萬里天風來荆州護衛指揮陳公伯英鞍馬之暇焚香吟詩高懷雅量令人起敬賦詩承教將軍少年英氣豪學劍論兵談六韜龜紋璅甲紫絲轡虎皮鞍韀紅錦袍三尺雕刀兩斛力八歲龍駒雙佩刀不憤旄頭如火赤從駕南征破蠻陌鴻雁啼霜瘴月昏駱駝載雪狼烟濕羽檄流星烽火連搴旗誓欲靜三邊銜枚榆塞金瘡苦洗箭沙泉戰血羶栁營日落鳴笳鼓玉帳籌邊月當午酒壓蒲萄壯士歌花插真珠美人舞奏凱歸來拜玉墀天恩頒宴畫樓西漢家未數蕭曹業麟閣丹青姓字題棲碧軒為陳指揮賦瑣窗斜隔紅塵道芳草滿簾晴不掃階前馬踏落花泥栁外鶯啼春色好羅袍犀帶紫金魚壁上瑤琴牀上書雲捲城頭春雨過一庭修竹讀陰符雲湖漁樂圖為陳茂叔賦船頭書百册船尾酒百壺懶騎桃花馬濯纓雲水湖手擕珊瑚竿不掛朱虎符壯心捲笠澤浩氣凌東吳寒食春風三月暮暖漲桃花香簇簇弱水三千錦浪紅禹門九萬晴濤緑身被紫團宮錦袍靈槎不厭銀河遙絲綸埀虹八百丈坐弄明月吹鸞簫罡風泠泠挽雙袖手捫箕尾聞雲璈醉來晞髮支機石鼓枻天津釣六鼇棲霞軒為王文質賦丹霞爛兮五色光昭回雲漢成文章朝逐神龍共寥廓暮隨威鳯同翺翔丹霞炫兮釀春酒階下萱花對晴晝紫簫清瑟間齊謳衣綵髙堂獻眉壽人生此樂真良圖奉親報國多清娛眼中富貴自有待身退功成逰五湖倒騎青鸞過𤣥圃池上碧桃花滿路搴衣笑拍洪崖肩醉看滄海珊瑚樹宿黃州城下懷蘇仙五雲宮闕芙蓉苑燭襯金蓮賜宮宴翰林風月紫薇花錦袍犀帶黃金硯一朝遷謫來黃州滿頭風雪寒颼颼蹇驢破帽秃雙鬢兒啼妻怒聲啾啾瓶無儲粟家四壁斗酒誰换烏貂裘饑腸一字不堪煮清苦占斷人間秋獨倚竹樓題短句酒入五腸肝膽露自揎布袖捲天風繞壁龍蛇起烟霧九重忽報天恩來寒谷得暖陽春回黃封御宴賜顔色賀客門迎車馬排朱輪皂蓋五花誥赤霄白日登蓬萊人生得失有如此覆手為雲翻手雨我因登眺撫江城歷歷東坡舊逰處臨髙弔古不勝悲落日滄波白鳥飛金馬玉堂天上夢茶烟禪榻鬢如絲過南湖觜城頭開船北風起帆輕直過南湖觜上水歡呼下水嗟龍王廟前准燒紙小婦攀罾楊柳磯淮鹽换得鱖魚肥沽來新酒不成醉卧聽鄰船歌竹枝宿潯陽潯陽城頭秋雁啼霜寒木落紅霏霏孤舟晚泊日當酉纜繫石橋楊栁磯庾樓基廢迷烟樹猶記樓船爭戰處草店蕭條野客沽女牆依舊官軍戍逝水滔滔送落暉繁華雲變不勝題當年司馬青衫淚翆袖琵琶夢已非求陸伯瞻作懶雲莊圖老米已矣房山逝江海丹青少奇祕故人胸次出神奇寫法誰能識天趣倒翻墨汁金蟾蜍珊瑚翡翠相縈紆逺樹浮青氣黯淡遙山疊翠烟糢糊洞庭八月波如鏡一片玻瓈三萬頃白蘋香老雁啼霜九點蒼梧落秋影煩君為寫懶雲莊樹根絡石苔連牆丹崖深處三間屋坐弄紫簫書滿牀送丁兼善還荆州大邦維襄國門户軫翼經躔分野次西帶巴樊控楚墟東連吳㑹跨淮泗凌雲宫闕麗中天府下英豪總世賢賓客那能朱履宴簮纓未數玳瑁筵行旌枉顧溪頭屋瀟灑襟期慰幽獨藍田日暖出奇姿紫畹瓊蘭藹清馥交情絶愛眼中稀慷慨霏談不忍違只恐王程軍務速青雲荆樹馬騑騑送春詩珊瑚鈎搭黃金索楊花香雪穿珠箔綵雲蟠翠繡麒麟宮衣初試羅衫薄雉扇班移午漏遲麝煤浮硯墨淋漓筆掃粉箋龍影動殿頭新賦送春詩劉彥昺集卷五

body:
  text: 劉彥昺集卷三明劉炳撰楊維楨評樂府擬題出塞九重頒鳯詔單于入井陘三邊徴候騎五道出奇兵戰雲連陳黑烽煙照漢青蛇文弓挂月龍氣劍流星酬恩不顧命金印斗來擎評曰又似初唐體格入塞旄頭昨夜斂徴兵入漢關將軍定勳業壯士悲刀環旗裂雕雲畫衣穿龍錦團磧月老鄉淚風沙銷箭瘢閨中謾歌舞今日到長安劉生健兒如馬駒墮地便有千里足平生忠與孝拳拳惟佩服烈女不自媒美女原韞櫝豈無匡濟心四海作霖雨命左與時違長嘯還鄉里評曰不無自信邯鄲行白日下藂臺野曠秋風早不聞歌吹聲空遺往來道傷心却憶平原君墓上牛羊踏荒草評曰可慨可慨寒夜怨月來愁亦來心憐月去愁應改樓髙月轉遲停箏坐倚熏籠待月落却成眠誰知枕冷愁仍在評曰古調同雲同雲四翳零雨其滂虎嘯谷風鳳鳴朝陽呂望歸周尹摯佐湯仲父齊霸諸葛漢昌氣以類感道由義彰功濟九有千載之光飛龍篇扶桑戢彩崦嵫匿輝六轡既逸長戈莫揮盛年不重歔當以欷蘇秦未遇妻自機百里去家炊扊扅栖栖燕與雀安知鴻鵠悲評曰念歲月之遷功業無成耳玉階怨風開翡翆簾霜滿芙蓉葉欲上象牙牀鴛鴦冷還怯獨處愁金屋人稀到間螢去復回攬衣離鳯閣緘思捲鸞臺惟有多情月流連入妾懷烏棲曲烏夜啼梧桐樹愁夢回腸應苦蘭膏張照樹光啼烏去夜未央梧桐葉底清露墜一聲一滴相思淚評曰語新河中之水歌寄劉子雍程伯羽同賦河之水向東北洛陽女兒好顔色八歲畫娥眉九歲自裁衣十歲學識字十一拋梭攀錦機十二刺繡紋十三能賭棊十四彈箜篌十五才上頭鬢偏斜戴金團鳳臂弱不勝珠絡韝羅幃睡起傷春瘦畫閣粧成對日羞十六妖嬈解歌舞容色比花花不語含愁生怕下階行三寸春嬌雲一縷行媒將聘嫁周郎桂柱蘭臺錦作房比翼鏡奩粧玳瑁合歡裙帶繡鴛鴦茱萸露濕珊瑚枕蘇合香熏翡翠牀生憎飛絮催春去不分啼烏怨夜長枝成連理生何幸叉合同心死不忘眼前節物年年度只恐芳華不相顧南陌芙蓉午夜霜東園桃李三春雨君當為妾秉燭遊東海為缸糟作丘妾當為君金縷謳春風莫遣人間愁評曰香奩之流烏生同劉子憲賦慈烏知返哺羔羊乃跪乳嗟嗟世人何其愚不愛父與母飛為禽走為獸猶知生所自衣人衣食人食不若禽獸為孟宗泣竹冬笋生王祥求鯉堅氷穿黃香扇枕席陸績懷橘還郭巨埋子天乃賜之金與寶子路負米遙遙百里不敢難拳拳奉顔色惟恐母不歡陶母能剪髮孟母猶三遷拳拳教子心惟恐子不賢嗟豫何敢望古人頓踏心肝摧生不獲盡養死不獲盡哀海可竭山可夷終天之痛不可回誓當廬墓復銜土庶幾豫心千古萬萬古評曰純孝可念五雜組五雜組架上衣往復還庭下雞不獲已炊扊扅五雜組雲錦裳往復還雙鴛鴦不獲已守空房五雜組牀上裀往復還橋邊人不獲已行負薪五雜組織翠裾往復還溪中魚不獲已身當罏燕子樓同周伯寧賦寶瑟凝歌繞珠箔流蘇結帶黃金索翠香紅裏宿鴛鴦春風人間無此樂杏梁塵暗麝蘭篝黛鎖眉峯掩畫樓殘燈枕冷梨雲斷秋雨人間無此愁評曰再不忍誦桃葉青桃葉青青杏花吐樓頭吹笙教鸚鵡紅牙象板按梁州金縷衣裳美人舞離情不似月常圓桃葉青青似去年美人不來鸚鵡怨杏花零落畫樓前烏夜啼練髙同賦城頭烏啼風瑟瑟露滴銀牀秋月白錦屏金屋醉西施歌長漏短銅壺窄回首繁華散似雲姑蘇臺上鹿成羣今人却憶烏啼月此月還應照後人雍熹聖人務德蠲煩去苛既舞干羽載奏雲和八表雍雍含哺而歌彩霽鈎陳景融羲娥崑崙永峙渤海不波評曰古調也來日苦短黃子雍同賦來日苦短去日苦長人生如朝露不如嘯歌置酒臨髙堂春風不到九泉下盛年一去難再芳老行及之徒悲傷來日苦短去日苦催人生如朝露不如嘯歌置酒臨髙臺舊時歌舞今已矣章華百尺連青苔老行及之徒悲哀惜别詞端孝思同賦玳瑁筵前海榴樹歌舞翻成離别處花間藏却珊瑚鞭手挽郎衫怕郎去纎腰娥眉眼如醉惜别含羞枕郎臂鴛鴦枕上哭埀埀一聲一滴珍珠淚評曰艷怨東武吟壯年投筆去手提三尺箠戎衣才至骭短劍光陸離國士每自許獨賴相公知解衣衣我寒推食充我飢心懷犬馬報未有涓埃施十年在幕府徒將文墨持前星一夜落天地黯無輝功勳都若夢部曲各分違春草門前緑空遺櫪馬嘶月痕弓上挂雲影斾猶埀霸氣風雲散姓名誰復題落日將軍樹凄涼過客悲長哀波浩蕩不盡淚如絲評曰有托而言義亦可尚明妃曲胭脂馬雕鷹旗狐裘蒙茸金絡羈白玉作鞭雙袖埀手抱琵琶紅淚滋黛雲半軃顔如玉春嬌學得娥眉緑自擬將身寵漢宮誰憐薄命歸殊俗窮隂絶漠易悲辛落日哀笳處處聞嚴霜夜鎖關頭月朔氣寒飛磧裏雲鴻雁蔽天斜作字駱駝連塞動成羣漢家君臣亦良苦却將紅粉和邊土廟堂肉食列重裀汗簡如何照今古妾身分得君王憂萬死沙塵心亦休腸斷年年邊地夢心懸日日漢宮愁百年一身何足道妾容不似花容好漢家三十六宮春傾國傾城更有人君王故殺毛延夀特遣單于貢妾身評曰結句佳劉彥昺集卷三
